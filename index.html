<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bariloche 2026 — Planificador</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.4.0/dist/tabler-icons.min.css">
<style>
:root {
  --color-background-primary: #2C343E;
  --color-background-secondary: #0f1d2e;
  --color-background-tertiary: #070d1a;
  --color-text-primary: #dde5f0;
  --color-text-secondary: #96b0cc;
  --color-text-tertiary: #5a7088;
  --color-border-tertiary: rgba(90,140,210,0.1);
  --color-border-secondary: rgba(90,140,210,0.18);
  --color-border-primary: rgba(90,140,210,0.34);
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-serif: Georgia, serif;
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
  --border-radius-xl: 16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:#070d1a}
body{font-family:var(--font-sans);background:radial-gradient(ellipse 90% 55% at 18% 0%,rgba(18,45,95,0.45) 0%,transparent 60%),radial-gradient(ellipse 70% 45% at 85% 95%,rgba(8,32,70,0.35) 0%,transparent 60%),#070d1a;color:var(--color-text-primary);font-size:14px;min-height:100vh;scrollbar-width:none}
body::-webkit-scrollbar{display:none}
.app-wrapper{max-width:1080px;margin:0 auto;padding:1.5rem 1rem;position:relative;z-index:1}
.app-title{font-size:32px;font-weight:700;margin-bottom:1.5rem;color:#ffffff;letter-spacing:-.3px}
.app-title .title-date{font-size:14px;color:var(--color-text-secondary);font-weight:400;margin-left:8px}
.tabs{display:flex;gap:3px;margin-bottom:1.5rem;overflow-x:auto;padding:4px;scrollbar-width:none;align-items:center;background:#0a1525;border:1px solid rgba(90,140,210,0.15);border-radius:10px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.tabs::-webkit-scrollbar{display:none}
.tab-add{padding:6px 10px;border:1px solid transparent;background:none;cursor:pointer;color:var(--color-text-tertiary);font-size:16px;line-height:1;border-radius:6px;font-family:var(--font-sans);transition:all .15s}
.tab-add:hover{color:var(--color-text-secondary);background:rgba(90,140,210,0.08);border-color:rgba(90,140,210,0.15)}
.tab{padding:6px 13px;border:1px solid transparent;background:none;cursor:pointer;font-size:13px;color:var(--color-text-secondary);white-space:nowrap;border-radius:6px;font-family:var(--font-sans);transition:all .15s}
.tab.active{color:#041a10;background:#1D9E75;border-color:#1D9E75;box-shadow:0 0 14px rgba(29,158,117,0.4);font-weight:700}
.tab:hover:not(.active){color:var(--color-text-primary);background:rgba(90,140,210,0.07);border-color:rgba(90,140,210,0.14)}
.panel{display:none}.panel.active{display:block}
.card{background:#2C343E;border:1px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:.75rem;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);box-shadow:0 4px 24px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.03);transition:border-color .2s,transform .18s ease;overflow:hidden;position:relative}
.info-drop{max-height:0;overflow:hidden;opacity:0;transition:max-height .28s ease,opacity .22s ease}
.info-drop.info-drop-open{max-height:800px;opacity:1}
.card:hover{border-color:rgba(90,140,210,0.2)}
.card.done{opacity:1}
.card.done .item-name{text-decoration:underline}
.card.done .item-name > span{text-decoration:none}
.card-price{flex-shrink:0;align-self:center;text-align:right;padding:0 4px 0 14px}
.card-price-main{font-size:17px;font-weight:600;color:#22d685;line-height:1.1;white-space:nowrap}
.card-price-sub{font-size:10px;color:var(--color-text-secondary);margin-top:2px;white-space:nowrap}
.card-row{display:flex;align-items:flex-start;gap:12px}
.drag-handle{color:var(--color-text-tertiary);cursor:grab;flex-shrink:0;display:flex;align-items:center;padding-top:2px;opacity:.5;transition:opacity .15s}
.drag-handle:hover{opacity:1}
.drag-handle:active{cursor:grabbing}
.card-dragging{opacity:0.75;border-color:#1D9E75 !important;border-style:solid !important;box-shadow:0 0 14px rgba(29,158,117,0.35) !important}
.card-drag-over{}
.cal-day.cal-disabled{opacity:0.2;cursor:not-allowed;pointer-events:none}
.card-body{flex:1;min-width:0}
.item-name{font-weight:500;font-size:14px;margin-bottom:4px;word-break:break-word}
.item-meta{font-size:12px;color:var(--color-text-secondary);display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:400}
.badge-blue{background:rgba(28,75,180,0.22);color:#6ea8f0;border:.5px solid rgba(28,75,180,0.32)}
.badge-green{background:rgba(29,158,117,0.15);color:#1D9E75;border:.5px solid rgba(29,158,117,0.28)}
.badge-amber{background:rgba(175,95,15,0.2);color:#f0a050;border:.5px solid rgba(175,95,15,0.3)}
.badge-gray{background:rgba(80,105,140,0.18);color:#8898b5;border:.5px solid rgba(80,105,140,0.26)}
.badge-teal{background:rgba(0,155,150,0.17);color:#00c8b4;border:.5px solid rgba(0,155,150,0.28)}
.price-tag{font-size:13px;font-weight:500;color:#22d685;white-space:nowrap}
.card-actions{display:flex;gap:4px;flex-shrink:0;margin-top:2px}
.btn-icon{background:none;border:none;cursor:pointer;padding:4px;border-radius:6px;color:var(--color-text-tertiary);line-height:1;font-size:16px;transition:all .15s}
.btn-icon:hover{background:rgba(90,140,210,0.1);color:var(--color-text-primary)}
.btn-icon-active{color:#1D9E75}
.checkbox{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--color-border-secondary);background:rgba(6,12,24,0.7);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all .15s}
.checkbox.checked{background:#1D9E75;border-color:#1D9E75;box-shadow:0 0 7px rgba(29,158,117,0.45)}
.checkbox.checked::after{content:'';display:block;width:5px;height:9px;border:2px solid white;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px)}
.add-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border:1px dashed rgba(90,140,210,0.2);border-radius:var(--border-radius-md);background:none;cursor:pointer;color:var(--color-text-tertiary);font-size:13px;font-family:var(--font-sans);width:100%;justify-content:center;margin-top:.5rem;transition:all .15s}
.add-btn:hover{background:rgba(90,140,210,0.07);color:var(--color-text-secondary);border-color:rgba(90,140,210,0.32)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem;backdrop-filter:blur(4px)}
.modal{background:#0d1928;border:1px solid rgba(90,140,210,0.2);border-radius:var(--border-radius-lg);padding:1.5rem;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 16px 60px rgba(0,0,0,.7)}
.modal h3{margin-bottom:1rem;font-size:15px;font-weight:500;color:var(--color-text-primary)}
.form-group{margin-bottom:.75rem}
.form-group label{display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:4px;font-weight:500}
.form-group input,.form-group select,.form-group textarea{width:100%;font-family:var(--font-sans);font-size:13px;padding:7px 10px;border:1px solid rgba(90,140,210,0.18);border-radius:var(--border-radius-md);background:rgba(6,12,24,0.85);color:var(--color-text-primary);outline:none;transition:border-color .15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:rgba(29,158,117,0.55);box-shadow:0 0 0 2px rgba(29,158,117,0.1)}
.form-group textarea{resize:vertical;min-height:60px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:1rem;padding-top:1rem;border-top:1px solid rgba(90,140,210,0.1)}
.btn-primary{background:#1D9E75;color:white;border:none;padding:8px 16px;border-radius:var(--border-radius-md);cursor:pointer;font-size:13px;font-family:var(--font-sans);transition:all .15s;box-shadow:0 0 14px rgba(29,158,117,0.28)}
.btn-primary:hover{background:#18876A;box-shadow:0 0 18px rgba(29,158,117,0.38)}
.btn-secondary{background:rgba(90,140,210,0.08);border:1px solid rgba(90,140,210,0.2);padding:8px 16px;border-radius:var(--border-radius-md);cursor:pointer;font-size:13px;font-family:var(--font-sans);color:var(--color-text-primary);transition:all .15s}
.btn-secondary:hover{background:rgba(90,140,210,0.14);border-color:rgba(90,140,210,0.3)}
.btn-danger{background:none;border:1px solid rgba(226,75,74,0.4);color:#E24B4A;padding:8px 16px;border-radius:var(--border-radius-md);cursor:pointer;font-size:13px;font-family:var(--font-sans);transition:all .15s}
.btn-danger:hover{background:rgba(226,75,74,0.1);border-color:rgba(226,75,74,0.6)}
h2{font-size:18px;font-weight:500;margin-bottom:1rem;color:var(--color-text-primary)}
h3{font-size:15px;font-weight:500;margin-bottom:.75rem;color:var(--color-text-primary)}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.sort-btn{font-size:10px;padding:2px 7px;border:1px solid var(--color-border-secondary);background:none;color:var(--color-text-tertiary);border-radius:4px;cursor:pointer;font-family:var(--font-sans);white-space:nowrap;transition:all .15s;line-height:1.6}
.sort-btn:hover{color:var(--color-text-primary);border-color:rgba(29,158,117,0.4)}
.sort-btn.sort-active{color:#1D9E75;border-color:#1D9E75;background:rgba(29,158,117,0.08)}
.vu-list-wrap{overflow:hidden;transition:max-height .32s ease,opacity .22s ease;max-height:4000px;opacity:1}
.vu-list-wrap.vu-collapsed{max-height:0 !important;opacity:0}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.5rem}
.metric-card{background:#252d36;border:1px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:.875rem 1rem;backdrop-filter:blur(4px)}
.metric-card-persona{border:2px solid rgba(240,190,30,0.95);box-shadow:0 0 22px rgba(240,190,30,0.22)}
.metric-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.metric-value{font-size:22px;font-weight:500;color:#22d685}
.metric-card-persona .metric-value{color:var(--color-text-primary)}
.metric-sub{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.progress-bar{height:3px;background:rgba(90,140,210,0.12);border-radius:2px;margin:.5rem 0;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#12a864,#22d685);border-radius:2px;transition:width .3s;box-shadow:0 0 8px rgba(34,214,133,0.5)}
.divider{height:.5px;background:rgba(90,140,210,0.08);margin:1.25rem 0}
.link-text{color:#1D9E75;font-size:12px;text-decoration:none;display:inline-flex;align-items:center;gap:3px}
.link-text:hover{text-decoration:underline}
.selected-badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;background:rgba(34,214,133,0.18);color:#22d685;border:1px solid rgba(34,214,133,0.4);font-weight:500;margin-left:6px}
.itinerary-day{border:1px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:.75rem;background:#2C343E}
.itinerary-day-header{display:flex;align-items:center;gap:10px;margin-bottom:.5rem;flex-wrap:wrap}
.day-label{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;background:rgba(90,140,210,0.1);color:var(--color-text-secondary);white-space:nowrap;border:1px solid rgba(90,140,210,0.13)}
.day-activity{font-size:14px;font-weight:500}
.day-note{font-size:12px;color:var(--color-text-secondary);margin-top:4px}
.traslado-pending{font-size:12px;color:var(--color-text-tertiary);font-style:italic}
@media(max-width:480px){.summary-grid{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}}
@media(min-width:768px){.summary-grid{grid-template-columns:repeat(4,1fr)}}
.cal-day{cursor:pointer;padding:6px 2px;border-radius:6px;font-size:13px;text-align:center;color:var(--color-text-primary);transition:background .1s}
.cal-day:hover{background:rgba(90,140,210,0.1)}
.cal-day.sel{background:#1D9E75;color:white;font-weight:600;box-shadow:0 0 8px rgba(29,158,117,0.45)}
.cal-day.sel:hover{background:#18876A}
#admin-overlay{position:fixed;inset:0;background:var(--color-background-tertiary);z-index:3000;overflow-y:auto;display:none}
.admin-wrap{max-width:680px;margin:0 auto;padding:2rem 1rem}
.admin-trip-card{background:rgba(11,19,33,0.85);border:1px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:.75rem;display:flex;align-items:flex-start;justify-content:space-between;gap:1rem}
.admin-trip-card .trip-hash{font-size:11px;color:var(--color-text-tertiary);font-family:monospace;margin-top:3px}
#undo-toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:rgba(215,228,248,0.95);color:#0a1020;padding:.625rem 1.125rem;border-radius:20px;display:none;align-items:center;gap:.875rem;box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:4000;font-size:13px;white-space:nowrap;animation:toastIn .2s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes confirmIn{from{opacity:0;transform:scale(.94) translateY(-10px)}to{opacity:1;transform:scale(1) translateY(0)}}
#undo-btn{color:#0d8a60!important}
</style>
</head>
<body>
<div class="app-wrapper">
  <div id="app-title" class="app-title"></div>
  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="resumen"><i class="ti ti-layout-dashboard"></i> Resumen</button>
    <button class="tab" data-tab="vuelos"><i class="ti ti-plane"></i> Embarques</button>
    <button class="tab" data-tab="hospedaje"><i class="ti ti-home"></i> Hospedaje</button>
    <button class="tab" data-tab="traslados"><i class="ti ti-car"></i> Traslados</button>
    <button class="tab" data-tab="actividades"><i class="ti ti-map"></i> Actividades</button>
    <button class="tab" data-tab="ski"><i class="ti ti-mountain"></i> Ski & Equipo</button>
    <button id="tab-add-btn" class="tab-add" onclick="formCustomTab(null)" title="Nueva sección"><i class="ti ti-plus"></i></button>
  </div>
  <div id="panel-resumen" class="panel active"></div>
  <div id="panel-vuelos" class="panel"></div>
  <div id="panel-hospedaje" class="panel"></div>
  <div id="panel-traslados" class="panel"></div>
  <div id="panel-actividades" class="panel"></div>
  <div id="panel-ski" class="panel"></div>
</div>

<div id="admin-overlay">
  <div class="admin-wrap">
    <div id="admin-content"></div>
  </div>
</div>

<div id="undo-toast"><span id="undo-label"></span><button id="undo-btn" style="background:none;border:none;color:#1D9E75;font-family:var(--font-sans);font-size:13px;font-weight:600;cursor:pointer;padding:0">Deshacer</button></div>

<div id="modal-overlay" class="modal-overlay" style="display:none">
  <div class="modal" id="modal-box"></div>
</div>
<div id="discard-overlay" style="display:none;position:fixed;inset:0;z-index:200;align-items:center;justify-content:center;background:rgba(0,0,0,0.55);backdrop-filter:blur(2px)">
  <div style="background:#1e2a38;border:1px solid rgba(90,140,210,0.38);border-radius:var(--border-radius-xl);padding:1.5rem 1.75rem;max-width:296px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.7);text-align:center;animation:confirmIn .18s ease">
    <div style="font-size:15px;font-weight:600;color:#ffffff;margin-bottom:.375rem">¿Salir sin guardar?</div>
    <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:1.25rem;line-height:1.5">Los datos que ingresaste se perderán si salís ahora.</div>
    <div style="display:flex;gap:.625rem">
      <button onclick="confirmDiscard()" class="btn-secondary" style="flex:1">Salir</button>
      <button onclick="cancelDiscard()" class="btn-primary" style="flex:1">Seguir editando</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script>
const $ = id => document.getElementById(id);
const fmt = n => n ? Math.round(n).toLocaleString('es-AR') : '—';

const DEFAULT = {
  tripName: 'Mi Viaje',
  tripDate: '',
  personas: [],
  vuelos: {},
  hospedaje: [],
  ski: { dias: [], pase: [], equipo: [], ropa: [] },
  actividades: [],
  traslados: [],
  customTabs: [],
  skiVisible: true,
  skiName: 'Ski & Equipo',
  skiDesc: '',
  skiSections: {pase:'Pase de ski',equipo:'Alquiler de equipo',ropa:'Alquiler de ropa de nieve'},
  tabNotes: {}
};

function migrateState(s){
  if(s.vuelos&&s.vuelos.santi!==undefined){
    s={...s,personas:[],vuelos:{}};
  }
  if(!s.personas)s.personas=[];
  if(!s.vuelos||Array.isArray(s.vuelos))s.vuelos={};
  else Object.keys(s.vuelos).forEach(k=>{s.vuelos[k]=s.vuelos[k].map(v=>({descripcion:'',notas:'',horaPartida:'',horaLlegada:'',fechaLlegada:'',horaPartidaVuelta:'',horaLlegadaVuelta:'',fechaLlegadaVuelta:'',tramos:[],...v,tramos:(v.tramos||[]).map(t=>({horaPartida:'',horaLlegada:'',fechaLlegada:'',...t}))}));});
  if(!s.tripName)s.tripName='Mi Viaje';
  if(s.tripDate===undefined)s.tripDate='';
  if(!s.ski)s.ski={dias:[],pase:[],equipo:[],ropa:[]};
  else{if(!s.ski.dias)s.ski.dias=[];if(!s.ski.pase)s.ski.pase=[];if(!s.ski.equipo)s.ski.equipo=[];if(!s.ski.ropa)s.ski.ropa=[];}
  if(s.actividades)s.actividades=s.actividades.map(a=>({fecha:'',fechaFin:'',participantes:[],...a}));
  if(!s.hospedaje)s.hospedaje=[];
  else s.hospedaje=s.hospedaje.map(h=>({participantes:[],fechaInicio:'',fechaFin:'',...h}));
  if(!s.traslados)s.traslados=[];
  else s.traslados=s.traslados.map(t=>({participantes:[],fecha:'',...t}));
  ['pase','equipo','ropa'].forEach(k=>{s.ski[k]=s.ski[k].map(i=>({participantes:[],...i}));});
  if(!s.customTabs)s.customTabs=[];
  else s.customTabs=s.customTabs.map(ct=>({fechas:[],...ct,secciones:(ct.secciones||[]).map(sec=>({...sec,items:(sec.items||[]).map(i=>({participantes:[],...i}))}))}));
  if(s.skiVisible===undefined)s.skiVisible=true;
  if(!s.skiName)s.skiName='Ski & Equipo';
  if(s.skiDesc===undefined)s.skiDesc='';
  if(!s.skiSections)s.skiSections={pase:'Pase de ski',equipo:'Alquiler de equipo',ropa:'Alquiler de ropa de nieve'};
  if(!s.tabNotes)s.tabNotes={};
  return s;
}

let state;
function lsKey(){return'trip_'+TRIP_ID;}
function loadState(){try{const s=localStorage.getItem(lsKey());if(s)return migrateState(JSON.parse(s));}catch(e){}return JSON.parse(JSON.stringify(DEFAULT));}
let _saveTimer=null;
function saveState(){
  try{localStorage.setItem(lsKey(),JSON.stringify(state));}catch(e){}
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>tripDoc.set(state).catch(console.error),600);
}

function getSelected(arr){return arr?arr.find(i=>i.checked)||null:null;}
function nextId(arr){return Math.max(0,...arr.map(i=>i.id))+1;}

let _undoTimer=null;
let _actParticExpanded=new Set();
function toggleActPartic(id){_actParticExpanded.has(id)?_actParticExpanded.delete(id):_actParticExpanded.add(id);renderActividades();}
function toggleParticipante(actId,personaId){
  const a=state.actividades.find(a=>a.id===actId);if(!a)return;
  const all=state.personas.map(p=>p.id);
  if(!(a.participantes||[]).length){
    a.participantes=all.filter(id=>id!==personaId);
  } else if(a.participantes.includes(personaId)){
    a.participantes=a.participantes.filter(id=>id!==personaId);
    if(a.participantes.length===all.length)a.participantes=[];
  } else {
    a.participantes=[...a.participantes,personaId];
    if(a.participantes.length===all.length)a.participantes=[];
  }
  saveState();renderActividades();renderResumen();
}
let _particExpanded=new Set();
function toggleParticOpen(key,panel){_particExpanded.has(key)?_particExpanded.delete(key):_particExpanded.add(key);renderPanel(panel);}
let _drag={src:null,col:null,extra:null};
let _vuSortState={};
let _vuCollapsed=new Set();
function _getDragArr(col,extra){
  if(col==='vuelos')return state.vuelos[String(extra)]||[];
  if(col==='hospedaje')return state.hospedaje;
  if(col==='actividades')return state.actividades;
  if(col==='traslados')return state.traslados;
  if(col==='ski-dias')return state.ski.dias||[];
  if(col.startsWith('ski-'))return state.ski[col.slice(4)]||[];
  if(col.startsWith('ct-')){const p=col.split('-');const ct=(state.customTabs||[]).find(t=>t.id===p[1]);const sec=(ct?.secciones||[]).find(s=>s.id===parseInt(p[2]));return sec?.items||[];}
  return[];
}
function _setDragArr(col,extra,arr){
  if(col==='vuelos'){state.vuelos[String(extra)]=arr;}
  else if(col==='hospedaje')state.hospedaje=arr;
  else if(col==='actividades')state.actividades=arr;
  else if(col==='traslados')state.traslados=arr;
  else if(col==='ski-dias')state.ski.dias=arr;
  else if(col.startsWith('ski-'))state.ski[col.slice(4)]=arr;
  else if(col.startsWith('ct-')){const p=col.split('-');const ct=(state.customTabs||[]).find(t=>t.id===p[1]);const sec=(ct?.secciones||[]).find(s=>s.id===parseInt(p[2]));if(sec)sec.items=arr;}
}
function _renderDragCol(col){
  if(col==='vuelos'){renderVuelos();renderResumen();}
  else if(col==='hospedaje'){renderHospedaje();renderResumen();}
  else if(col==='actividades'){renderActividades();renderResumen();}
  else if(col==='traslados'){renderTraslados();renderResumen();}
  else if(col==='ski-dias'||col.startsWith('ski-')){renderSki();renderResumen();}
  else if(col.startsWith('ct-')){renderCustomTab(col.split('-')[1]);renderResumen();}
}
function dragStart(e,col,id,extra){
  _drag={src:id,col,extra,srcH:e.currentTarget.offsetHeight+10,overId:null};
  e.dataTransfer.effectAllowed='move';
  const blank=new Image();
  blank.src='data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
  e.dataTransfer.setDragImage(blank,0,0);
  setTimeout(()=>e.currentTarget.classList.add('card-dragging'),0);
}
function dragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';}
function dragEnter(e,col,id){
  if(_drag.col!==col||_drag.src===id)return;
  if(_drag.overId===id)return;
  _drag.overId=id;
  const parent=e.currentTarget.parentElement;
  const cards=Array.from(parent.querySelectorAll(':scope>.card[data-drag-id]'));
  const srcIdx=cards.findIndex(c=>+c.dataset.dragId===_drag.src);
  const dstIdx=cards.findIndex(c=>+c.dataset.dragId===id);
  if(srcIdx<0||dstIdx<0)return;
  const h=_drag.srcH||80;
  cards.forEach((card,i)=>{
    let shift=0;
    if(i===srcIdx){shift=(dstIdx-srcIdx)*h;}
    else if(srcIdx<dstIdx){if(i>srcIdx&&i<=dstIdx)shift=-h;}
    else{if(i>=dstIdx&&i<srcIdx)shift=h;}
    card.style.transform=shift?`translateY(${shift}px)`:'';
  });
}
function dragLeave(e){}
function dragDrop(e,col,id,extra){
  e.preventDefault();
  if(!_drag.src||_drag.col!==col)return;
  const targetId=_drag.overId!==null?_drag.overId:id;
  if(!targetId||targetId===_drag.src)return;
  const arr=_getDragArr(col,extra);
  const from=arr.findIndex(i=>i.id===_drag.src);
  const to=arr.findIndex(i=>i.id===targetId);
  if(from<0||to<0)return;
  const[item]=arr.splice(from,1);
  arr.splice(to,0,item);
  _setDragArr(col,extra,arr);
  saveState();
  _renderDragCol(col);
}
function dragEnd(e){
  document.querySelectorAll('.card-dragging').forEach(el=>{el.classList.remove('card-dragging');});
  document.querySelectorAll('.card[data-drag-id]').forEach(c=>{c.style.transform='';});
  _drag={src:null,col:null,extra:null,srcH:80,overId:null};
}
const _dh=`<div class="drag-handle" onclick="event.stopPropagation()" title="Arrastrar para reordenar"><i class="ti ti-grip-vertical" style="font-size:15px"></i></div>`;
function _flipAnimate(positions){
  requestAnimationFrame(()=>{
    Object.entries(positions).forEach(([id,oldTop])=>{
      const el=document.querySelector(`.card[data-drag-id="${id}"]`);
      if(!el)return;
      const delta=oldTop-el.getBoundingClientRect().top;
      if(Math.abs(delta)<1)return;
      el.style.transition='none';
      el.style.transform=`translateY(${delta}px)`;
      requestAnimationFrame(()=>{
        el.style.transition='transform .28s ease';
        el.style.transform='';
        el.addEventListener('transitionend',()=>{el.style.transition='';},{once:true});
      });
    });
  });
}
function toggleVuCollapse(personaId){
  const pid=String(personaId);
  _vuCollapsed.has(pid)?_vuCollapsed.delete(pid):_vuCollapsed.add(pid);
  const wrap=document.getElementById('vu-wrap-'+pid);
  if(wrap)wrap.classList.toggle('vu-collapsed',_vuCollapsed.has(pid));
  const chev=document.getElementById('vu-chev-'+pid);
  if(chev)chev.style.transform=_vuCollapsed.has(pid)?'rotate(-90deg)':'';
}
function sortVuelos(personaId,key){
  const pid=String(personaId);
  const cur=_vuSortState[pid];
  const asc=(cur&&cur.key===key)?!cur.asc:true;
  _vuSortState[pid]={key,asc};
  const arr=state.vuelos[pid]||[];
  const positions={};
  arr.forEach(v=>{
    const el=document.querySelector(`.card[data-drag-id="${v.id}"]`);
    if(el)positions[String(v.id)]=el.getBoundingClientRect().top;
  });
  arr.sort((a,b)=>{
    let va,vb;
    if(key==='nombre'){va=(a.nombre||'').toLowerCase();vb=(b.nombre||'').toLowerCase();}
    else if(key==='fecha'){va=a.fechaIda||'';vb=b.fechaIda||'';}
    else if(key==='costo'){va=(a.precio||0)+(a.tramos||[]).reduce((s,t)=>s+(t.precio||0),0);vb=(b.precio||0)+(b.tramos||[]).reduce((s,t)=>s+(t.precio||0),0);}
    else{va=a.id;vb=b.id;}
    if(va<vb)return asc?-1:1;
    if(va>vb)return asc?1:-1;
    return 0;
  });
  state.vuelos[pid]=arr;
  saveState();
  renderVuelos();
  _flipAnimate(positions);
}
let _infoExpanded=new Set();
function toggleInfoDrop(key,panel){
  const el=document.querySelector(`.info-drop[data-key="${key}"]`);
  if(_infoExpanded.has(key)){
    _infoExpanded.delete(key);
    if(el)el.classList.remove('info-drop-open');
    else renderPanel(panel);
  } else {
    _infoExpanded.add(key);
    if(el)el.classList.add('info-drop-open');
    else renderPanel(panel);
  }
}
function _infoRow(r){return`<div style="display:flex;gap:.5rem;align-items:baseline;padding:.18rem 0"><span style="font-size:11px;color:rgba(255,255,255,0.45);min-width:80px;flex-shrink:0">${r.label}</span><span style="font-size:12px;color:${r.color||'#ffffff'}">${r.html||r.value}</span></div>`;}
function infoDropHtml(key,rows,extra){
  const f=rows.filter(r=>r.value!==undefined&&r.value!==null&&r.value!==''&&r.value!==0&&r.value!==false);
  if(!f.length&&!extra)return'';
  const isOpen=_infoExpanded.has(key);
  return`<div class="info-drop${isOpen?' info-drop-open':''}" data-key="${key}"><div style="padding:.875rem 0 .25rem;border-top:1px solid var(--color-border-tertiary)">${f.map(_infoRow).join('')}${extra||''}</div></div>`;
}
function vuMetaHtml(v){
  const fd=d=>/^\d{4}-\d{2}-\d{2}$/.test(d)?fmtDate(d):d;
  const arrTime=(hp,hl,fl)=>{
    if(!hp&&!hl)return'';
    let s='';
    if(hp)s+=` ${hp}`;
    if(hl){s+=hp?' - ':' ';if(fl&&/^\d{4}-\d{2}-\d{2}$/.test(fl))s+=fmtDate(fl)+' ';s+=hl;}
    return s;
  };
  const p=[];
  if(v.descripcion)p.push(`<span style="color:var(--color-text-secondary)">${v.descripcion}</span>`);
  if(v.fechaIda)p.push(`<span>Ida: ${fd(v.fechaIda)}${arrTime(v.horaPartida,v.horaLlegada,v.fechaLlegada)}</span>`);
  if(v.fechaVuelta)p.push(`<span>Vuelta: ${fd(v.fechaVuelta)}${arrTime(v.horaPartidaVuelta,v.horaLlegadaVuelta,v.fechaLlegadaVuelta)}</span>`);
  if(v.notas)p.push(`<span style="color:var(--color-text-secondary);font-style:italic">${v.notas}</span>`);
  (v.tramos||[]).forEach(t=>{
    const tp=[];
    if(t.descripcion)tp.push(`<span style="color:var(--color-text-secondary)">${t.descripcion}</span>`);
    if(t.fechaIda)tp.push(`<span>Ida: ${fd(t.fechaIda)}${arrTime(t.horaPartida,t.horaLlegada,t.fechaLlegada)}</span>`);
    if(t.notas)tp.push(`<span style="color:var(--color-text-secondary);font-style:italic">${t.notas}</span>`);
    if(tp.length){p.push(`<span style="color:#22d685;font-weight:700;padding:0 2px">|</span>`);p.push(...tp);}
  });
  if(!p.length)return'';
  return`<div class="item-meta">${p.join('')}</div>`;
}
function vuInfoDrop(key,v){
  const fd=d=>/^\d{4}-\d{2}-\d{2}$/.test(d)?fmtDate(d):d;
  const isIso=d=>/^\d{4}-\d{2}-\d{2}$/.test(d||'');
  const withTimes=(date,hp,hl,fl)=>{
    let s=fd(date);
    if(hp)s+=' · '+hp;
    if(hl)s+=' → '+(isIso(fl)?fd(fl)+' ':'')+hl;
    return s;
  };
  const rows=[];
  if(v.descripcion)rows.push({label:'Descripción',value:v.descripcion});
  if(v.aerolinea)rows.push({label:'Empresa',value:v.aerolinea});
  if(v.fechaIda)rows.push({label:'Ida',value:withTimes(v.fechaIda,v.horaPartida,v.horaLlegada,v.fechaLlegada)});
  if(v.fechaVuelta)rows.push({label:'Vuelta',value:withTimes(v.fechaVuelta,v.horaPartidaVuelta,v.horaLlegadaVuelta,v.fechaLlegadaVuelta)});
  if(v.precio)rows.push({label:'Precio',value:'$'+fmt(v.precio),color:'#22d685'});
  if(v.link)rows.push({label:'Link',html:`<a href="${v.link}" target="_blank" style="color:#00cce0;text-decoration:none;word-break:break-all">${v.link}</a>`,value:'_'});
  if(v.notas)rows.push({label:'Notas',value:v.notas});
  const tramosExtra=(v.tramos||[]).map((t,i)=>{
    const tr=[];
    if(t.nombre)tr.push({label:'Nombre',value:t.nombre});
    if(t.aerolinea)tr.push({label:'Empresa',value:t.aerolinea});
    if(t.fechaIda)tr.push({label:'Ida',value:withTimes(t.fechaIda,t.horaPartida,t.horaLlegada,t.fechaLlegada)});
    if(t.precio)tr.push({label:'Precio',value:'$'+fmt(t.precio),color:'#22d685'});
    if(t.notas)tr.push({label:'Notas',value:t.notas});
    if(t.link)tr.push({label:'Link',html:`<a href="${t.link}" target="_blank" style="color:#00cce0;text-decoration:none">${t.link}</a>`,value:'_'});
    const filtered=tr.filter(r=>r.value);if(!filtered.length)return'';
    return`<div style="margin-top:.5rem;padding-top:.5rem;border-top:1px solid var(--color-border-tertiary)"><div style="font-size:10px;color:#22d685;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.25rem">Conexión ${i+2}</div>${filtered.map(_infoRow).join('')}</div>`;
  }).join('');
  return infoDropHtml(key,rows,tramosExtra);
}
function _applyParticToggle(item,personaId){
  const all=state.personas.map(p=>p.id);
  if(!(item.participantes||[]).length){
    item.participantes=all.filter(id=>id!==personaId);
  } else if(item.participantes.includes(personaId)){
    item.participantes=item.participantes.filter(id=>id!==personaId);
    if(item.participantes.length===all.length)item.participantes=[];
  } else {
    item.participantes=[...item.participantes,personaId];
    if(item.participantes.length===all.length)item.participantes=[];
  }
}
function toggleHospPartic(itemId,personaId){const h=state.hospedaje.find(h=>h.id===itemId);if(!h)return;_applyParticToggle(h,personaId);saveState();renderHospedaje();renderResumen();}
function toggleTrasladoPartic(itemId,personaId){const t=state.traslados.find(t=>t.id===itemId);if(!t)return;_applyParticToggle(t,personaId);saveState();renderTraslados();renderResumen();}
function toggleSkiItemPartic(key,itemId,personaId){const i=(state.ski[key]||[]).find(i=>i.id===itemId);if(!i)return;_applyParticToggle(i,personaId);saveState();renderSki();renderResumen();}
function toggleCustomItemPartic(tabId,sectionId,itemId,personaId){
  const ct=(state.customTabs||[]).find(t=>t.id===tabId);
  const sec=ct&&(ct.secciones||[]).find(s=>s.id===sectionId);
  const item=sec&&(sec.items||[]).find(i=>i.id===itemId);
  if(!item)return;
  _applyParticToggle(item,personaId);
  saveState();renderCustomTab(tabId);renderResumen();
}
function showUndoToast(label,restoreFn,duration=5000){

}

function fmtDate(iso){
  if(!iso)return'';
  const[y,m,d]=iso.split('-').map(Number);
  return new Date(y,m-1,d).toLocaleDateString('es-AR',{weekday:'short',day:'numeric',month:'short'}).replace(/\./g,'');
}

function buildItinerary(){
  const byDate={};
  function addEvent(fecha,ev){if(!fecha)return;if(!byDate[fecha])byDate[fecha]=[];byDate[fecha].push(ev);}
  (state.ski.dias||[]).forEach(d=>{
    addEvent(d.fecha,{icon:'ti-mountain',label:'Ski — Cerro Catedral',note:d.notas||'',time:''});
  });
  state.actividades.forEach(a=>{
    const note=a.fechaFin?`Hasta el ${fmtDate(a.fechaFin)}`:(a.duracion||'');
    addEvent(a.fecha,{icon:'ti-map',label:a.nombre,note,badge:a.tipo,time:''});
  });
  state.personas.forEach(p=>{
    (state.vuelos[String(p.id)]||[]).forEach(v=>{
      const vNote=[v.horaPartida,v.horaLlegada].filter(Boolean).join(' → ');
      addEvent(v.fechaIda,{icon:'ti-plane-departure',label:v.nombre,note:vNote,badge:p.nombre,time:v.horaPartida||''});
      (v.tramos||[]).forEach(t=>{
        const tNote=[t.horaPartida,t.horaLlegada].filter(Boolean).join(' → ');
        addEvent(t.fechaIda,{icon:'ti-plane-departure',label:t.nombre,note:tNote,badge:p.nombre,time:t.horaPartida||''});
      });
    });
  });
  Object.keys(byDate).forEach(d=>{byDate[d].sort((a,b)=>{if(!a.time&&!b.time)return 0;if(!a.time)return 1;if(!b.time)return -1;return a.time.localeCompare(b.time);});});
  const sortedDates=Object.keys(byDate).sort();
  const undatedSki=(state.ski.dias||[]).filter(d=>!d.fecha);
  const undatedAct=state.actividades.filter(a=>!a.fecha);
  return{byDate,sortedDates,undatedSki,undatedAct};
}

let _calSelected=new Set();
let _calNotes={};
let _calStartYear=0,_calStartMonth=0;
const CAL_MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const CAL_DAYS=['Lu','Ma','Mi','Ju','Vi','Sá','Do'];

function renderCalMonth(year,month){
  const firstDow=(new Date(year,month,1).getDay()+6)%7;
  const total=new Date(year,month+1,0).getDate();
  const cells=[];
  for(let i=0;i<firstDow;i++)cells.push(`<div></div>`);
  for(let d=1;d<=total;d++){
    const iso=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cells.push(`<div class="cal-day${_calSelected.has(iso)?' sel':''}" id="cal-${iso}" onclick="toggleCalDay('${iso}')">${d}</div>`);
  }
  return`<div style="flex:1;min-width:190px">
    <div style="text-align:center;font-size:12px;font-weight:500;margin-bottom:.5rem;color:var(--color-text-secondary)">${CAL_MONTHS[month]} ${year}</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">
      ${CAL_DAYS.map(d=>`<div style="font-size:10px;color:var(--color-text-tertiary);text-align:center;padding:3px 0">${d}</div>`).join('')}
      ${cells.join('')}
    </div>
  </div>`;
}

function calSaveNotes(){
  Array.from(_calSelected).forEach(iso=>{const el=document.getElementById('cal-note-'+iso);if(el)_calNotes[iso]=el.value;});
}

function updateCalCount(){

function updateCalSelectedList(){

      <input id="cal-note-${iso}" type="text" value="${(_calNotes[iso]||'').replace(/"/g,'&quot;')}" placeholder="nota opcional..." style="flex:1;font-family:var(--font-sans);font-size:12px;padding:5px 8px;border:.5px solid var(--color-border-secondary);border-radius:6px;background:var(--color-background-primary);color:var(--color-text-primary);outline:none">
    </div>`).join('');
}

function toggleCalDay(iso){
  if(_calSelected.has(iso))_calSelected.delete(iso);
  else _calSelected.add(iso);
  const el=document.getElementById('cal-'+iso);
  if(el)el.classList.toggle('sel',_calSelected.has(iso));
  updateCalCount();
  updateCalSelectedList();
}

function calTitle(){
  const y2=_calStartMonth===11?_calStartYear+1:_calStartYear;
  const m2=_calStartMonth===11?0:_calStartMonth+1;
  return _calStartYear===y2?
    `${CAL_MONTHS[_calStartMonth].slice(0,3)} – ${CAL_MONTHS[m2].slice(0,3)} ${_calStartYear}`:
    `${CAL_MONTHS[_calStartMonth].slice(0,3)} ${_calStartYear} – ${CAL_MONTHS[m2].slice(0,3)} ${y2}`;
}

function rerenderCalGrids(){
  const y2=_calStartMonth===11?_calStartYear+1:_calStartYear;
  const m2=_calStartMonth===11?0:_calStartMonth+1;
  const g=document.getElementById('cal-grids');
  if(g)g.innerHTML=renderCalMonth(_calStartYear,_calStartMonth)+renderCalMonth(y2,m2);
  const t=document.getElementById('cal-title');
  if(t)t.textContent=calTitle();
  const now=new Date();
  const pb=document.getElementById('cal-prev');
  if(pb)pb.disabled=(_calStartYear===now.getFullYear()&&_calStartMonth===now.getMonth());
}

function navCal(delta){
  calSaveNotes();
  _calStartMonth+=delta;
  if(_calStartMonth>11){_calStartMonth=0;_calStartYear++;}
  if(_calStartMonth<0){_calStartMonth=11;_calStartYear--;}
  const now=new Date();
  if(_calStartYear<now.getFullYear()||(_calStartYear===now.getFullYear()&&_calStartMonth<now.getMonth())){
    _calStartMonth-=delta;
    if(_calStartMonth>11){_calStartMonth=0;_calStartYear++;}
    if(_calStartMonth<0){_calStartMonth=11;_calStartYear--;}
    return;
  }
  rerenderCalGrids();
}

function getAllPlannerDates(){
  const iso=/^\d{4}-\d{2}-\d{2}$/,d=[];
  state.actividades.forEach(a=>{if(iso.test(a.fecha||''))d.push(a.fecha);if(iso.test(a.fechaFin||''))d.push(a.fechaFin);});
  (state.ski.dias||[]).forEach(s=>{if(iso.test(s.fecha||''))d.push(s.fecha);});
  Object.values(state.vuelos||{}).forEach(list=>list.forEach(v=>{
    if(iso.test(v.fechaIda||''))d.push(v.fechaIda);
    if(iso.test(v.fechaVuelta||''))d.push(v.fechaVuelta);
  }));
  state.hospedaje.forEach(h=>{if(iso.test(h.fechaInicio||''))d.push(h.fechaInicio);if(iso.test(h.fechaFin||''))d.push(h.fechaFin);});
  state.traslados.forEach(t=>{if(iso.test(t.fecha||''))d.push(t.fecha);});
  (state.customTabs||[]).forEach(ct=>(ct.fechas||[]).forEach(f=>{if(iso.test(f.fecha||''))d.push(f.fecha);}));
  return d;
}
function smartCalStart(){
  const dates=getAllPlannerDates();
  if(!dates.length){const n=new Date();return{year:n.getFullYear(),month:n.getMonth()};}
  const today=new Date();today.setHours(0,0,0,0);
  const nearest=dates.map(d=>new Date(d+'T00:00:00')).sort((a,b)=>Math.abs(a-today)-Math.abs(b-today))[0];
  return{year:nearest.getFullYear(),month:nearest.getMonth()};
}
let _ipTarget=null,_ipCalId=null,_ipYear=0,_ipMonth=0,_ipMinDate=null;
function openInlineCal(inputId,calId){
  const cal=document.getElementById(calId);if(!cal)return;
  if(_ipCalId===calId&&cal.style.display!=='none'){closeInlineCal();return;}
  if(_ipCalId)closeInlineCal();
  _ipTarget=inputId;_ipCalId=calId;
  const ancestor=cal.closest('[data-min-from]');
  if(ancestor){const fromId=ancestor.dataset.minFrom;_ipMinDate=fromId?(document.getElementById(fromId)?.value||null):null;}
  else _ipMinDate=null;
  const{year,month}=smartCalStart();
  _ipYear=year;_ipMonth=month;
  if(_ipMinDate){const md=new Date(_ipMinDate+'T00:00:00');if(md.getFullYear()>_ipYear||(md.getFullYear()===_ipYear&&md.getMonth()>_ipMonth)){_ipYear=md.getFullYear();_ipMonth=md.getMonth();}}
  cal.style.display='block';
  renderInlineCal();
}
function closeInlineCal(){
  if(_ipCalId){const c=document.getElementById(_ipCalId);if(c)c.style.display='none';}
  _ipCalId=null;_ipTarget=null;
}
function navInlineCal(delta){
  _ipMonth+=delta;
  if(_ipMonth>11){_ipMonth=0;_ipYear++;}
  if(_ipMonth<0){_ipMonth=11;_ipYear--;}
  renderInlineCal();
}
function renderInlineCal(){
  const cal=document.getElementById(_ipCalId);if(!cal)return;
  const curVal=document.getElementById(_ipTarget)?.value||'';
  const firstDow=(new Date(_ipYear,_ipMonth,1).getDay()+6)%7;
  const total=new Date(_ipYear,_ipMonth+1,0).getDate();
  const cells=[];
  for(let i=0;i<firstDow;i++)cells.push('<div></div>');
  for(let d=1;d<=total;d++){
    const iso=`${_ipYear}-${String(_ipMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isDisabled=_ipMinDate&&iso<_ipMinDate;
    cells.push(`<div class="cal-day${iso===curVal?' sel':''}${isDisabled?' cal-disabled':''}"${isDisabled?'':` onclick="pickDate('${iso}')"`}>${d}</div>`);
  }
  cal.innerHTML=`<div style="background:#1a2535;border:1px solid rgba(90,140,210,0.22);border-radius:8px;padding:.625rem;margin-top:4px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem">
      <button type="button" class="btn-icon" onclick="navInlineCal(-1)"><i class="ti ti-chevron-left"></i></button>
      <span style="font-size:12px;font-weight:500;color:var(--color-text-secondary)">${CAL_MONTHS[_ipMonth]} ${_ipYear}</span>
      <button type="button" class="btn-icon" onclick="navInlineCal(1)"><i class="ti ti-chevron-right"></i></button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">
      ${CAL_DAYS.map(d=>`<div style="font-size:10px;color:var(--color-text-tertiary);text-align:center;padding:3px 0">${d}</div>`).join('')}
      ${cells.join('')}
    </div>
  </div>`;
}
function pickDate(iso){
  if(!_ipTarget)return;
  const target=_ipTarget;
  const inp=document.getElementById(target);if(inp)inp.value=iso;
  const lbl=document.getElementById(target+'-lbl');
  if(lbl){lbl.textContent=fmtDate(iso);lbl.parentElement.style.color='var(--color-text-primary)';}
  const xBtn=document.getElementById(target+'-xbtn');
  if(xBtn){xBtn.style.opacity='1';xBtn.style.pointerEvents='auto';}
  const arrlbl=document.getElementById(target+'-arrlbl');
  if(arrlbl)arrlbl.textContent=fmtDate(iso);
  const picker=document.getElementById(target+'-picker');
  if(picker)picker.style.display='none';
  closeInlineCal();
  _syncArrBtns(target);
  _filterArrTimeByDate(target);
}
function clearDateField(id){
  const inp=document.getElementById(id);if(inp)inp.value='';
  const lbl=document.getElementById(id+'-lbl');
  if(lbl){lbl.textContent='— elegir fecha —';lbl.parentElement.style.color='var(--color-text-tertiary)';}
  const xBtn=document.getElementById(id+'-xbtn');
  if(xBtn){xBtn.style.opacity='0';xBtn.style.pointerEvents='none';}
  const arrlbl=document.getElementById(id+'-arrlbl');
  if(arrlbl)arrlbl.textContent='';
  closeInlineCal();
  _syncArrBtns(id);
  _filterArrTimeByDate(id);
}
function _syncArrBtns(changedFromId){
  document.querySelectorAll('[data-arr-from]').forEach(btn=>{
    const fromId=btn.dataset.arrFrom;
    if(!fromId||fromId!==changedFromId)return;
    const fromVal=document.getElementById(fromId)?.value||'';
    const enabled=!!fromVal;
    btn.disabled=!enabled;
    btn.style.opacity=enabled?'1':'0.35';
    btn.style.pointerEvents=enabled?'':'none';
    btn.title=enabled?'Elegir día de llegada':'Elegir la fecha de ida primero';
    if(!enabled){
      const aid=btn.dataset.arrDateId;
      if(aid&&document.getElementById(aid)?.value){
        const ai=document.getElementById(aid);if(ai)ai.value='';
        const al=document.getElementById(aid+'-lbl');if(al){al.textContent='— elegir fecha —';al.parentElement.style.color='var(--color-text-tertiary)';}
        const ax=document.getElementById(aid+'-xbtn');if(ax){ax.style.opacity='0';ax.style.pointerEvents='none';}
        const ab=document.getElementById(aid+'-arrlbl');if(ab)ab.textContent='';
        const ap=document.getElementById(aid+'-picker');if(ap)ap.style.display='none';
        closeInlineCal();
      }
    }
  });
}
function _updateTimeField(id){
  const h=document.getElementById(id+'-h')?.value||'';
  const m=document.getElementById(id+'-m')?.value||'';
  const el=document.getElementById(id);
  if(el)el.value=(h&&m)?h+':'+m:'';
  _filterArrTime(id);
}
function _filterArrTime(depTimeId){
  if(!depTimeId)return;
  document.querySelectorAll(`select[data-arr-dep="${depTimeId}"]`).forEach(hSel=>{
    const arrId=hSel.dataset.arrId;const arrDateId=hSel.dataset.arrDateId;
    if(!arrId)return;
    const mSel=document.getElementById(arrId+'-m');
    const hidInp=document.getElementById(arrId);
    const depTime=document.getElementById(depTimeId)?.value||'';
    const[dh,dm]=depTime?depTime.split(':').map(Number):[null,null];
    const isDiffDay=!!(arrDateId&&document.getElementById(arrDateId)?.value);
    const noDepTime=!depTime;
    const curH=hSel.value?parseInt(hSel.value):null;
    const minH=(!isDiffDay&&dh!==null)?dh:0;
    let hOpts='<option value="">HH</option>';
    if(!noDepTime){for(let i=minH;i<24;i++){const v=String(i).padStart(2,'0');hOpts+=`<option value="${v}"${curH===i&&curH>=minH?' selected':''}>${v}</option>`;}}
    hSel.innerHTML=hOpts;hSel.disabled=noDepTime;
    if(noDepTime){hSel.style.opacity='0.5';}else{hSel.style.opacity='';}
    if(!mSel)return;
    const newH=hSel.value?parseInt(hSel.value):null;
    const curM=mSel.value?parseInt(mSel.value):null;
    const minM=(!isDiffDay&&newH!==null&&newH===dh&&dm!==null)?dm:0;
    let mOpts='<option value="">MM</option>';
    if(!noDepTime&&newH!==null){for(let i=0;i<60;i+=5){if(i<minM)continue;const v=String(i).padStart(2,'0');mOpts+=`<option value="${v}"${curM!==null&&Math.floor(curM/5)*5===i&&curM>=minM?' selected':''}>${v}</option>`;}}
    mSel.innerHTML=mOpts;mSel.disabled=noDepTime||newH===null;
    if(mSel.disabled){mSel.style.opacity='0.5';}else{mSel.style.opacity='';}
    if(hidInp){const fH=hSel.value;const fM=mSel.value;hidInp.value=(fH&&fM)?fH+':'+fM:'';}
  });
}
function _arrHourChange(arrTimeId,depTimeId){
  const hSel=document.getElementById(arrTimeId+'-h');
  const mSel=document.getElementById(arrTimeId+'-m');
  const hidInp=document.getElementById(arrTimeId);
  if(!hSel||!mSel)return;
  const selH=hSel.value?parseInt(hSel.value):null;
  const depTime=depTimeId?document.getElementById(depTimeId)?.value||'':'';
  const[dh,dm]=depTime?depTime.split(':').map(Number):[null,null];
  const arrDateId=hSel.dataset.arrDateId;
  const isDiffDay=!!(arrDateId&&document.getElementById(arrDateId)?.value);
  const minM=(!isDiffDay&&selH!==null&&selH===dh&&dm!==null)?dm:0;
  const curM=mSel.value?parseInt(mSel.value):null;
  let mOpts='<option value="">MM</option>';
  if(selH!==null){for(let i=0;i<60;i+=5){if(i<minM)continue;const v=String(i).padStart(2,'0');mOpts+=`<option value="${v}"${curM!==null&&Math.floor(curM/5)*5===i&&curM>=minM?' selected':''}>${v}</option>`;}}
  mSel.innerHTML=mOpts;mSel.disabled=selH===null;
  if(mSel.disabled){mSel.style.opacity='0.5';}else{mSel.style.opacity='';}
  const fH=hSel.value;const fM=mSel.value;
  if(hidInp)hidInp.value=(fH&&fM)?fH+':'+fM:'';
}
function _filterArrTimeByDate(dateId){
  document.querySelectorAll(`select[data-arr-date-id="${dateId}"]`).forEach(hSel=>{
    const depId=hSel.dataset.arrDep;if(depId)_filterArrTime(depId);

}

  _calNotes={};
  (state.ski.dias||[]).forEach(d=>{if(d.fecha&&d.notas)_calNotes[d.fecha]=d.notas;});
  const{year:_sy,month:_sm}=smartCalStart();
  _calStartYear=_sy;_calStartMonth=_sm;
  openModal(`<h3>Días de ski</h3>
    <p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:.75rem">Tocá los días para seleccionarlos.</p>

function saveSkiCalendar(){
  calSaveNotes();
  const existingByDate={};
  (state.ski.dias||[]).forEach(d=>{if(d.fecha)existingByDate[d.fecha]=d;});
  let maxId=Math.max(0,...(state.ski.dias||[]).map(d=>d.id));
  state.ski.dias=Array.from(_calSelected).sort().map(fecha=>{
    const notas=_calNotes[fecha]||'';
    return existingByDate[fecha]?{...existingByDate[fecha],notas}:{id:++maxId,fecha,notas};
  });
  saveState();closeModal();renderSki();renderResumen();
}

function addSkiDia(){openSkiCalendar();}
function editSkiDia(id){formSkiDia((state.ski.dias||[]).find(d=>d.id===id));}
function saveSkiDia(id){
  if(!state.ski.dias)state.ski.dias=[];
  const n={fecha:$('skd').value,notas:$('skn').value};
  if(id){state.ski.dias=state.ski.dias.map(d=>d.id===id?{...d,...n}:d);}
  else{state.ski.dias.push({...n,id:nextId(state.ski.dias)});}
  saveState();closeModal();renderSki();renderResumen();
}
function deleteSkiDia(id){
  const dias=state.ski.dias||[];
  const item=dias.find(d=>d.id===id);const idx=dias.findIndex(d=>d.id===id);
  state.ski.dias=dias.filter(d=>d.id!==id);
  saveState();renderSki();renderResumen();
  showUndoToast('Día de ski eliminado',()=>{state.ski.dias.splice(Math.min(idx,state.ski.dias.length),0,item);saveState();renderSki();renderResumen();});
}

function calcResumen(){
  const n=Math.max(state.personas.length,1);

  const hospChecked=state.hospedaje.filter(h=>h.checked);
  const hospTotal=hospChecked.reduce((s,h)=>s+(h.precioTotal||0),0);
  const hospForPerson=id=>hospChecked.reduce((sum,h)=>{
    const p=h.participantes||[];
    if(!p.length||p.includes(id)){const cnt=p.length||n;return sum+Math.round((h.precioTotal||0)/cnt);}
    return sum;
  },0);

  const pases=(state.ski.pase||[]).filter(i=>i.checked);
  const equipos=(state.ski.equipo||[]).filter(i=>i.checked);
  const ropas=(state.ski.ropa||[]).filter(i=>i.checked);
  const skiItems=[...pases,...equipos,...ropas];
  const skiPorDia=skiItems.reduce((s,i)=>s+(i.precio||0),0);
  const skiDias=(state.ski.dias||[]).length;
  const skiForPerson=id=>skiItems.reduce((sum,i)=>{
    const p=i.participantes||[];
    return(!p.length||p.includes(id))?sum+(i.precio||0):sum;
  },0)*Math.max(skiDias,1);

  const trasladosChecked=state.traslados.filter(t=>t.checked);
  const trasladosForPerson=id=>trasladosChecked.reduce((sum,t)=>{
    const p=t.participantes||[];
    if(!p.length||p.includes(id)){
      if(t.precioPP!==false)return sum+(t.precio||0);
      const cnt=p.length||n;
      return sum+Math.round((t.precio||0)/cnt);
    }
    return sum;
  },0);

  const actChecked=state.actividades.filter(a=>a.checked);

  const customSummary=(state.customTabs||[]).map(ct=>{
    const items=(ct.secciones||[]).flatMap(s=>(s.items||[]).filter(i=>i.checked));
    const total=items.reduce((s,i)=>s+(i.precio||0),0);
    const forPerson=id=>items.reduce((sum,i)=>{
      const p=i.participantes||[];
      return(!p.length||p.includes(id))?sum+(i.precio||0):sum;
    },0);
    return{id:ct.id,nombre:ct.nombre,items,total,forPerson};
  }).filter(ct=>ct.items.length>0);

  const personas=state.personas.map(p=>{
    const vuelosChecked=(state.vuelos[String(p.id)]||[]).filter(v=>v.checked);
    const vueloTotal=vuelosChecked.reduce((s,v)=>s+(v.precio||0)+(v.tramos||[]).reduce((ts,t)=>ts+(t.precio||0),0),0);
    const actForMe=actChecked.filter(a=>!(a.participantes||[]).length||(a.participantes||[]).includes(p.id)).reduce((s,a)=>s+(a.precio||0),0);
    const hospForMe=hospForPerson(p.id);
    const skiForMe=skiForPerson(p.id);
    const trasladosForMe=trasladosForPerson(p.id);
    const customForMe=customSummary.reduce((sum,ct)=>sum+ct.forPerson(p.id),0);
    const total=vueloTotal+hospForMe+skiForMe+trasladosForMe+actForMe+customForMe;
    const myActItems=actChecked.filter(a=>!(a.participantes||[]).length||(a.participantes||[]).includes(p.id));
    const myHosp=hospChecked.filter(h=>{const pa=h.participantes||[];return !pa.length||pa.includes(p.id);});
    const mySki=skiItems.filter(i=>{const pa=i.participantes||[];return !pa.length||pa.includes(p.id);});
    const myTraslados=trasladosChecked.filter(t=>{const pa=t.participantes||[];return !pa.length||pa.includes(p.id);});
    const expenses=[
      {label:'Embarque',amount:vueloTotal,
       detail:vuelosChecked.length>1?vuelosChecked.length+' embarques':(vuelosChecked[0]?.nombre||''),
       date:vuelosChecked[0]?.fechaIda||vuelosChecked[0]?.fechaVuelta||''},
      {label:'Hospedaje',amount:hospForMe,
       detail:myHosp.length>1?myHosp.length+' hospedajes':(myHosp[0]?.nombre||''),
       date:myHosp[0]?.fechaInicio?fmtDate(myHosp[0].fechaInicio)+(myHosp[0].fechaFin?' – '+fmtDate(myHosp[0].fechaFin):''):myHosp[0]?.fechas||''},
      {label:state.skiName||'Ski',amount:skiForMe,
       detail:mySki.length>1?mySki.length+' ítems':(mySki[0]?.nombre||''),
       date:(state.ski.dias||[])[0]?.fecha||''},
      {label:'Traslados',amount:trasladosForMe,
       detail:myTraslados.length>1?myTraslados.length+' traslados':(myTraslados[0]?.nombre||''),
       date:''},
      {label:'Actividades',amount:actForMe,
       detail:myActItems.length>1?myActItems.length+' actividades':(myActItems[0]?.nombre||''),
       date:myActItems[0]?.fecha||''},
    ].filter(e=>e.amount>0).sort((a,b)=>b.amount-a.amount);
    return{...p,vuelosChecked,vueloTotal,actForMe,hospForMe,skiForMe,trasladosForMe,customForMe,total,topExpense:expenses[0]||null};
  });

  const hospPP=personas.length?personas[0].hospForMe:Math.round(hospTotal/n);
  const skiPP=personas.length?personas[0].skiForMe:skiPorDia*Math.max(skiDias,1);
  const trasladosPP=personas.length?personas[0].trasladosForMe:trasladosChecked.reduce((s,t)=>s+(t.precioPP!==false?(t.precio||0):Math.round((t.precio||0)/n)),0);
  const hospAllSame=personas.length<=1||personas.every(p=>p.hospForMe===hospPP);
  const skiAllSame=personas.length<=1||personas.every(p=>p.skiForMe===skiPP);
  const trasladosAllSame=personas.length<=1||personas.every(p=>p.trasladosForMe===trasladosPP);

  return{n,personas,hospChecked,hospTotal,hospPP,hospAllSame,pases,equipos,ropas,skiItems,skiPorDia,skiPP,skiAllSame,skiDias,trasladosChecked,trasladosPP,trasladosAllSame,actChecked,customSummary};
}

function platformBadge(p){
  const m={Airbnb:'badge-blue','Airbnb AR':'badge-blue',Booking:'badge-teal',Hostelworld:'badge-amber'};
  return m[p]||'badge-gray';
}

    <div style="display:flex;flex-wrap:wrap;gap:.5rem">
      ${state.personas.map(p=>`
        <div style="display:flex;align-items:center;gap:6px;padding:6px 10px;border:.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary)">
          <i class="ti ti-user" style="font-size:14px;color:var(--color-text-secondary)"></i>
          <span style="font-size:13px;font-weight:500">${p.nombre}</span>
          ${p.origen?`<span style="font-size:11px;color:var(--color-text-secondary)">${p.origen}</span>`:''}
          <button class="btn-icon" onclick="editPersona(${p.id})" style="font-size:14px;padding:2px"><i class="ti ti-edit"></i></button>
        </div>`).join('')}

  </div>`;
}

function formPersona(p,firstRun){
  _modalLocked=!!firstRun;
  const isEdit=!!p;
  p=p||{nombre:'',origen:''};
  openModal(`<h3>${firstRun?'Bienvenido — ¿cómo te llamás?':isEdit?'Editar viajero':'Nuevo viajero'}</h3>
    <div class="form-group"><label>Nombre</label><input id="pn" value="${p.nombre}" placeholder="ej: Santi"></div>
    <div class="form-group"><label>Origen / ciudad</label><input id="po" value="${p.origen}" placeholder="ej: Mendoza — MDZ"></div>
    <div class="modal-actions">
      ${isEdit&&!firstRun&&state.personas.length>1?`<button class="btn-danger" onclick="deletePersona(${p.id})">Eliminar</button>`:''}
      ${!firstRun?`<button class="btn-secondary" onclick="closeModal()">Cancelar</button>`:''}
      ${firstRun?`<button class="btn-secondary" onclick="_modalLocked=false;closeModal()">Después...</button>`:''}
      <button class="btn-primary" onclick="savePersona(${isEdit?p.id:0})">${firstRun?'Empezar':'Guardar'}</button>
    </div>`);
  setTimeout(()=>$('pn')&&$('pn').focus(),50);
}
function editPersona(id){formPersona(state.personas.find(p=>p.id===id),false);}
function savePersona(id){
  const nombre=$('pn').value.trim();
  if(!nombre)return;
  const origen=$('po').value.trim();
  if(id){
    state.personas=state.personas.map(p=>p.id===id?{...p,nombre,origen}:p);
  } else {
    const newId=Math.max(0,...state.personas.map(p=>p.id))+1;
    state.personas.push({id:newId,nombre,origen});
    if(!state.vuelos[String(newId)])state.vuelos[String(newId)]=[];
  }
  _modalLocked=false;
  saveState();closeModal();renderResumen();
}
function deletePersona(id){
  if(state.personas.length<=1)return;
  const persona=state.personas.find(p=>p.id===id);
  const idx=state.personas.findIndex(p=>p.id===id);
  const vuelos=state.vuelos[String(id)]||[];
  state.personas=state.personas.filter(p=>p.id!==id);
  delete state.vuelos[String(id)];
  saveState();closeModal();renderResumen();
  showUndoToast(`"${persona.nombre}" eliminado`,()=>{
    state.personas.splice(Math.min(idx,state.personas.length),0,persona);
    state.vuelos[String(id)]=vuelos;
    saveState();renderResumen();
  });
}

function itemPriceBlock(amount,sub=''){
  if(!amount)return`<div class="card-price"><div class="card-price-main" style="color:var(--color-text-tertiary);font-size:13px">—</div></div>`;
  return`<div class="card-price"><div class="card-price-main">$${fmt(amount)}</div>${sub?`<div class="card-price-sub">${sub}</div>`:''}</div>`;
}
function _perPersonRows(personas,fieldFn){
  return personas.map(p=>`<div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px;gap:6px"><span style="font-size:12px;font-weight:600">${p.nombre}</span><span style="font-size:12px;font-weight:500;flex-shrink:0">${fieldFn(p)>0?'$'+fmt(fieldFn(p)):'—'}</span></div>`).join('');
}
const _mcNav='cursor:pointer;transition:border-color .15s,box-shadow .15s';
function _mcWrap(tab,inner){return`<div class="metric-card" onclick="switchTab('${tab}')" style="${_mcNav}">${inner}</div>`;}
function hospMetricCard(r){
  const lbl=r.hospChecked.map(h=>h.fechaInicio?fmtDate(h.fechaInicio)+(h.fechaFin?' – '+fmtDate(h.fechaFin):''):h.fechas||h.nombre).join(' | ');
  if(r.hospAllSame||r.personas.length<=1)return _mcWrap('hospedaje',`<div class="metric-label">Hospedaje (p/p)</div><div class="metric-value">$${fmt(r.hospPP)}</div><div class="metric-sub">${lbl}</div>`);
  return _mcWrap('hospedaje',`<div class="metric-label">Hospedaje</div>${_perPersonRows(r.personas,p=>p.hospForMe)}<div style="font-size:11px;color:var(--color-text-tertiary);margin-top:4px">${lbl}</div>`);
}
function skiMetricCard(r){
  const lbl=r.skiItems.map(i=>i.nombre).join(' + ');
  const daysLbl=r.skiDias>1?' ('+r.skiDias+' días)':'';
  if(r.skiAllSame||r.personas.length<=1)return _mcWrap('ski',`<div class="metric-label">${state.skiName||'Ski & Equipo'}${daysLbl} p/p</div><div class="metric-value">$${fmt(r.skiPP)}</div><div class="metric-sub">${lbl}</div>`);
  return _mcWrap('ski',`<div class="metric-label">${state.skiName||'Ski & Equipo'}${daysLbl}</div>${_perPersonRows(r.personas,p=>p.skiForMe)}<div style="font-size:11px;color:var(--color-text-tertiary);margin-top:4px">${lbl}</div>`);
}
function trasladosMetricCard(r){
  const lbl=r.trasladosChecked.length>2?r.trasladosChecked.length+' traslados':r.trasladosChecked.map(t=>t.nombre).join(', ');
  if(r.trasladosAllSame||r.personas.length<=1)return _mcWrap('traslados',`<div class="metric-label">Traslados (p/p)</div><div class="metric-value">$${fmt(r.trasladosPP)}</div><div class="metric-sub">${lbl}</div>`);
  return _mcWrap('traslados',`<div class="metric-label">Traslados</div>${_perPersonRows(r.personas,p=>p.trasladosForMe)}<div style="font-size:11px;color:var(--color-text-tertiary);margin-top:4px">${lbl}</div>`);
}
function customTabMetricCard(ct,r){
  const perP=r.personas.map(p=>ct.forPerson(p.id));
  const allSame=perP.length<=1||perP.every(c=>c===perP[0]);
  const lbl=ct.items.length>2?ct.items.length+' ítems':ct.items.map(i=>i.nombre).join(' + ');
  if(allSame)return _mcWrap(ct.id,`<div class="metric-label">${ct.nombre}${r.personas.length>1?' (p/p)':''}</div><div class="metric-value">$${fmt(perP[0]||0)}</div><div class="metric-sub">${lbl}</div>`);
  return _mcWrap(ct.id,`<div class="metric-label">${ct.nombre}</div>${r.personas.map((p,i)=>`<div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px;gap:6px"><span style="font-size:12px;font-weight:600">${p.nombre}</span><span style="font-size:12px;font-weight:500;flex-shrink:0">${perP[i]>0?'$'+fmt(perP[i]):'—'}</span></div>`).join('')}<div style="font-size:11px;color:var(--color-text-tertiary);margin-top:4px">${lbl}</div>`);
}
function actMetricCard(r){
  const actLabel=r.actChecked.length>2?r.actChecked.length+' actividades':r.actChecked.map(a=>a.nombre).join(', ');
  const costs=r.personas.map(p=>p.actForMe);
  const allSame=costs.length>0&&costs.every(c=>c===costs[0]);
  if(allSame||r.personas.length<=1)return _mcWrap('actividades',`<div class="metric-label">Actividades (p/p)</div><div class="metric-value">$${fmt(costs[0]||0)}</div><div class="metric-sub">${actLabel}</div>`);
  return _mcWrap('actividades',`<div class="metric-label">Actividades</div>${r.personas.map(p=>`<div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px;gap:6px"><span style="font-size:12px;font-weight:600">${p.nombre}</span><span style="font-size:12px;font-weight:500;flex-shrink:0">${p.actForMe>0?'$'+fmt(p.actForMe):'—'}</span></div>`).join('')}<div style="font-size:11px;color:var(--color-text-tertiary);margin-top:4px">${actLabel}</div>`);
}

    <div style="font-size:11px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.5rem">Sin fecha asignada</div>
    ${it.undatedSki.map(()=>`<div style="display:flex;align-items:center;gap:6px;padding:3px 0"><i class="ti ti-mountain" style="font-size:13px;color:var(--color-text-secondary)"></i><span style="font-size:13px;color:var(--color-text-secondary)">Ski — sin fecha</span></div>`).join('')}

  </div>`:'';
  const itEmpty=it.sortedDates.length===0&&it.undatedSki.length===0&&it.undatedAct.length===0?`<p style="font-size:12px;color:var(--color-text-tertiary)">Agregá fechas a actividades y días de ski para ver el itinerario.</p>`:'';
  $('panel-resumen').innerHTML=`
<h2>Resumen del viaje</h2>
<div style="display:flex;align-items:center;gap:8px;padding:.625rem .875rem;background:#2C343E;border-radius:var(--border-radius-md);margin-bottom:1.25rem;border:.5px solid var(--color-border-tertiary)">
  <i class="ti ti-link" style="font-size:14px;color:var(--color-text-secondary);flex-shrink:0"></i>

  <button id="copy-url-btn" onclick="copyTripUrl()" style="font-size:12px;padding:5px 13px;white-space:nowrap;flex-shrink:0;display:inline-flex;align-items:center;gap:5px;background:#00cce0;color:#041a20;border:none;border-radius:var(--border-radius-md);cursor:pointer;font-family:var(--font-sans);font-weight:600;box-shadow:0 0 12px rgba(0,204,224,0.35)"><i class="ti ti-copy" style="font-size:13px"></i>Copiar</button>
</div>
${renderPersonas()}
<div style="margin-bottom:1.25rem">

<div class="summary-grid">

</div>

${r.personas.map(p=>p.vuelosChecked.length===0?lineItem('Embarque '+p.nombre,'Sin seleccionar',null,'vuelos'):p.vuelosChecked.map(v=>lineItem('Embarque '+p.nombre,v.nombre,(v.precio||0)+(v.tramos||[]).reduce((s,t)=>s+(t.precio||0),0),'vuelos')).join('')).join('')}
${r.hospChecked.length===0?lineItem('Hospedaje (p/p)','Sin seleccionar',null,'hospedaje'):r.hospChecked.map(h=>lineItem('Hospedaje (p/p)',h.nombre,Math.round(h.precioTotal/r.n),'hospedaje')).join('')}
${r.pases.length===0?lineItem('Pase ski','Sin seleccionar',null,'ski'):r.pases.map(i=>lineItem('Pase ski',i.nombre,i.precio,'ski')).join('')}
${r.equipos.length===0?lineItem('Equipo ski','Sin seleccionar',null,'ski'):r.equipos.map(i=>lineItem('Equipo ski',i.nombre,i.precio,'ski')).join('')}
${r.ropas.length===0?lineItem('Ropa de nieve','Sin seleccionar',null,'ski'):r.ropas.map(i=>lineItem('Ropa de nieve',i.nombre,i.precio,'ski')).join('')}
${r.trasladosChecked.length===0?lineItem('Traslados','Sin seleccionar',null,'traslados'):r.trasladosChecked.map(t=>lineItem(t.nombre,t.tipo||'',t.precio,'traslados')).join('')}
${r.actChecked.length===0?lineItem('Actividades','Sin seleccionar',null,'actividades'):r.actChecked.map(a=>lineItem(a.nombre,a.tipo||'',a.precio||null,'actividades')).join('')}
${r.customSummary.map(ct=>ct.items.map(i=>lineItem(ct.nombre,i.nombre,i.precio||null,ct.id)).join('')).join('')}
</div>
<div class="divider"></div>
<h3>Itinerario</h3>
${itEmpty}${itDated}${itUndated}`;
}

function lineItem(label,name,price,tab){
  const isSet=price!==null;
  return`<div style="display:flex;align-items:center;justify-content:space-between;padding:.5rem .75rem;border-radius:var(--border-radius-md);background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary)">

function switchTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  $('panel-'+id).classList.add('active');
  renderPanel(id);
}

function newId(){return(typeof crypto!=='undefined'&&crypto.randomUUID)?crypto.randomUUID():Date.now().toString(36)+Math.random().toString(36).slice(2);}

function renderTabs(){
  const activeId=document.querySelector('.tab.active')?.dataset.tab;
  $('tabs').querySelectorAll('[data-custom]').forEach(b=>b.remove());
  document.querySelectorAll('.panel[data-custom]').forEach(p=>p.remove());
  const wrapper=document.querySelector('.app-wrapper');
  const addBtn=$('tab-add-btn');
  (state.customTabs||[]).forEach(ct=>{
    const btn=document.createElement('button');
    btn.className='tab';btn.dataset.tab=ct.id;btn.dataset.custom='1';
    if(activeId===ct.id)btn.classList.add('active');
    btn.innerHTML=`<i class="ti ti-grid-dots"></i> ${ct.nombre}`;
    $('tabs').insertBefore(btn,addBtn);
    const panel=document.createElement('div');
    panel.id='panel-'+ct.id;panel.className='panel';panel.dataset.custom='1';
    if(activeId===ct.id)panel.classList.add('active');
    wrapper.appendChild(panel);
  });
  const skiBtn=document.querySelector('.tab[data-tab="ski"]');
  if(skiBtn){
    skiBtn.style.display=state.skiVisible===false?'none':'';
    skiBtn.innerHTML=`<i class="ti ti-mountain"></i> ${state.skiName||'Ski & Equipo'}`;
  }
