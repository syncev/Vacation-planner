<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bariloche 2026 — Planificador</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.4.0/dist/tabler-icons.min.css">
<style>
:root {
  --color-background-primary: #ffffff;
  --color-background-secondary: #f5f5f4;
  --color-background-tertiary: #eeede9;
  --color-text-primary: #1a1a18;
  --color-text-secondary: #6b6b68;
  --color-text-tertiary: #9b9b98;
  --color-border-tertiary: rgba(0,0,0,0.12);
  --color-border-secondary: rgba(0,0,0,0.22);
  --color-border-primary: rgba(0,0,0,0.35);
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-serif: Georgia, serif;
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
  --border-radius-xl: 16px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --color-background-primary: #1c1c1a;
    --color-background-secondary: #252523;
    --color-background-tertiary: #2e2e2b;
    --color-text-primary: #f0ede8;
    --color-text-secondary: #a8a8a4;
    --color-text-tertiary: #6b6b68;
    --color-border-tertiary: rgba(255,255,255,0.10);
    --color-border-secondary: rgba(255,255,255,0.18);
    --color-border-primary: rgba(255,255,255,0.28);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--color-background-tertiary);color:var(--color-text-primary);font-size:14px;min-height:100vh;scrollbar-width:none}
body::-webkit-scrollbar{display:none}
.app-wrapper{max-width:720px;margin:0 auto;padding:1.5rem 1rem}
.app-title{font-size:22px;font-weight:500;margin-bottom:1.5rem}
.app-title span{font-size:14px;color:var(--color-text-secondary);font-weight:400;margin-left:8px}
.tabs{display:flex;gap:4px;border-bottom:.5px solid var(--color-border-tertiary);margin-bottom:1.5rem;overflow-x:auto;padding-bottom:0}
.tab{padding:8px 14px;border:none;background:none;cursor:pointer;font-size:13px;color:var(--color-text-secondary);white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:var(--font-sans)}
.tab.active{color:var(--color-text-primary);border-bottom-color:var(--color-text-primary);font-weight:500}
.tab:hover:not(.active){color:var(--color-text-primary);background:var(--color-background-secondary);border-radius:6px 6px 0 0}
.panel{display:none}.panel.active{display:block}
.card{background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:.75rem}
.card.done{opacity:.6}
.card.done .item-name{text-decoration:line-through;color:var(--color-text-secondary)}
.card-row{display:flex;align-items:flex-start;gap:12px}
.card-body{flex:1;min-width:0}
.item-name{font-weight:500;font-size:14px;margin-bottom:4px;word-break:break-word}
.item-meta{font-size:12px;color:var(--color-text-secondary);display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:400}
.badge-blue{background:#E6F1FB;color:#0C447C}
.badge-green{background:#EAF3DE;color:#27500A}
.badge-amber{background:#FAEEDA;color:#633806}
.badge-gray{background:#F1EFE8;color:#444441}
.badge-teal{background:#E1F5EE;color:#085041}
.price-tag{font-size:13px;font-weight:500;color:var(--color-text-primary);white-space:nowrap}
.card-actions{display:flex;gap:4px;flex-shrink:0;margin-top:2px}
.btn-icon{background:none;border:none;cursor:pointer;padding:4px;border-radius:6px;color:var(--color-text-secondary);line-height:1;font-size:16px}
.btn-icon:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.checkbox{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--color-border-secondary);background:var(--color-background-primary);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all .15s}
.checkbox.checked{background:#1D9E75;border-color:#1D9E75}
.checkbox.checked::after{content:'';display:block;width:5px;height:9px;border:2px solid white;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px)}
.add-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border:.5px dashed var(--color-border-secondary);border-radius:var(--border-radius-md);background:none;cursor:pointer;color:var(--color-text-secondary);font-size:13px;font-family:var(--font-sans);width:100%;justify-content:center;margin-top:.5rem}
.add-btn:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem}
.modal{background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.5rem;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal h3{margin-bottom:1rem;font-size:15px;font-weight:500}
.form-group{margin-bottom:.75rem}
.form-group label{display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:4px;font-weight:500}
.form-group input,.form-group select,.form-group textarea{width:100%;font-family:var(--font-sans);font-size:13px;padding:7px 10px;border:.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);outline:none}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--color-border-primary);box-shadow:0 0 0 2px rgba(0,0,0,.06)}
.form-group textarea{resize:vertical;min-height:60px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:1rem;padding-top:1rem;border-top:.5px solid var(--color-border-tertiary)}
.btn-primary{background:var(--color-text-primary);color:var(--color-background-primary);border:none;padding:8px 16px;border-radius:var(--border-radius-md);cursor:pointer;font-size:13px;font-family:var(--font-sans)}
.btn-primary:hover{opacity:.85}
.btn-secondary{background:none;border:.5px solid var(--color-border-secondary);padding:8px 16px;border-radius:var(--border-radius-md);cursor:pointer;font-size:13px;font-family:var(--font-sans);color:var(--color-text-primary)}
.btn-secondary:hover{background:var(--color-background-secondary)}
.btn-danger{background:none;border:.5px solid #E24B4A;color:#E24B4A;padding:8px 16px;border-radius:var(--border-radius-md);cursor:pointer;font-size:13px;font-family:var(--font-sans)}
.btn-danger:hover{background:#FCEBEB}
h2{font-size:18px;font-weight:500;margin-bottom:1rem}
h3{font-size:15px;font-weight:500;margin-bottom:.75rem}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.5rem}
.metric-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.875rem 1rem}
.metric-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.metric-value{font-size:22px;font-weight:500}
.metric-sub{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.progress-bar{height:4px;background:var(--color-background-secondary);border-radius:2px;margin:.5rem 0;overflow:hidden}
.progress-fill{height:100%;background:#1D9E75;border-radius:2px;transition:width .3s}
.divider{height:.5px;background:var(--color-border-tertiary);margin:1.25rem 0}
.link-text{color:#185FA5;font-size:12px;text-decoration:none;display:inline-flex;align-items:center;gap:3px}
.link-text:hover{text-decoration:underline}
.selected-badge{font-size:10px;padding:2px 7px;border-radius:20px;background:#E1F5EE;color:#085041;border:.5px solid #9FE1CB;font-weight:500;margin-left:6px}
.itinerary-day{border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:.75rem}
.itinerary-day-header{display:flex;align-items:center;gap:10px;margin-bottom:.5rem;flex-wrap:wrap}
.day-label{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;background:var(--color-background-secondary);color:var(--color-text-secondary);white-space:nowrap}
.day-activity{font-size:14px;font-weight:500}
.day-note{font-size:12px;color:var(--color-text-secondary);margin-top:4px}
.traslado-pending{font-size:12px;color:var(--color-text-tertiary);font-style:italic}
@media(max-width:480px){.summary-grid{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app-wrapper">
  <div id="app-title" class="app-title"></div>
  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="resumen"><i class="ti ti-layout-dashboard"></i> Resumen</button>
    <button class="tab" data-tab="vuelos"><i class="ti ti-plane"></i> Vuelos</button>
    <button class="tab" data-tab="hospedaje"><i class="ti ti-home"></i> Hospedaje</button>
    <button class="tab" data-tab="ski"><i class="ti ti-mountain"></i> Ski & Equipo</button>
    <button class="tab" data-tab="actividades"><i class="ti ti-map"></i> Actividades</button>
    <button class="tab" data-tab="traslados"><i class="ti ti-car"></i> Traslados</button>
  </div>
  <div id="panel-resumen" class="panel active"></div>
  <div id="panel-vuelos" class="panel"></div>
  <div id="panel-hospedaje" class="panel"></div>
  <div id="panel-ski" class="panel"></div>
  <div id="panel-actividades" class="panel"></div>
  <div id="panel-traslados" class="panel"></div>
</div>

<div id="modal-overlay" class="modal-overlay" style="display:none">
  <div class="modal" id="modal-box"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
const $ = id => document.getElementById(id);
const fmt = n => n ? Math.round(n).toLocaleString('es-AR') : '—';

const DEFAULT = {
  tripName: 'Mi Viaje',
  tripDate: '',
  personas: [],
  vuelos: {},
  hospedaje: [
    {id:1,nombre:'Villa los Coihues',plataforma:'Airbnb',fechas:'14–18 ago',precioTotal:200000,checked:false,link:'https://www.airbnb.com/rooms/28982267?check_in=2026-08-14&check_out=2026-08-18&guests=1&adults=2',notas:''},
    {id:2,nombre:'Villa los Coihues',plataforma:'Booking',fechas:'14–18 ago',precioTotal:200000,checked:false,link:'https://www.booking.com/Share-M77bux',notas:''},
    {id:3,nombre:'Bariloche Sur',plataforma:'Airbnb',fechas:'14–18 ago',precioTotal:200000,checked:false,link:'https://www.airbnb.com/rooms/1283376091846965155?check_in=2026-08-14&check_out=2026-08-18&guests=1&adults=2',notas:''},
    {id:4,nombre:'Airbnb opción 3',plataforma:'Airbnb',fechas:'14–18 ago',precioTotal:200000,checked:false,link:'https://www.airbnb.com/rooms/1633645829947158429?check_in=2026-08-14&check_out=2026-08-18&guests=1&adults=2',notas:''},
    {id:5,nombre:'Airbnb opción 4 (centro)',plataforma:'Airbnb',fechas:'14–18 ago',precioTotal:200000,checked:false,link:'https://www.airbnb.com/rooms/1127370243374108079?check_in=2026-08-14&check_out=2026-08-18&guests=1&adults=2',notas:''},
    {id:6,nombre:'Hotel Booking 1',plataforma:'Booking',fechas:'14–18 ago',precioTotal:0,checked:false,link:'https://www.booking.com/Share-GIE97nr',notas:''},
    {id:7,nombre:'Hotel Booking 2',plataforma:'Booking',fechas:'14–18 ago',precioTotal:0,checked:false,link:'https://www.booking.com/Share-xs9Mcxv',notas:''},
    {id:8,nombre:'Hospedaje Penthouse 1004 — hab. privada',plataforma:'Hostelworld',fechas:'6–10 ago (ref)',precioTotal:411600,checked:false,link:'https://www.spanish.hostelworld.com/pwa/hosteldetails.php/Hospedaje-Penthouse-1004/Bariloche/59459',notas:'Habitación privada matrimonial'},
    {id:9,nombre:'Moving Hostel — 2 camas privadas',plataforma:'Hostelworld',fechas:'6–10 ago (ref)',precioTotal:387200,checked:false,link:'https://www.spanish.hostelworld.com/pwa/hosteldetails.php/Moving-Hostel-Travel-Bar/Bariloche/78949',notas:'Básico, baño compartido'},
    {id:10,nombre:'Hostel Achalay — 2 camas privadas',plataforma:'Hostelworld',fechas:'6–10 ago (ref)',precioTotal:336000,checked:false,link:'https://www.spanish.hostelworld.com/pwa/hosteldetails.php/Hostel-Achalay/Bariloche/8690',notas:'Baño compartido'},
    {id:11,nombre:'Villa Catedral — Airbnb AR',plataforma:'Airbnb AR',fechas:'ref jul-ago',precioTotal:400,checked:false,link:'https://www.airbnb.com.ar/rooms/17886055',notas:'Precio en USD'},
  ],
  ski: {
    dias: [],
    pase: [{id:1,nombre:'Pase Cerro Catedral',descripcion:'1 día, adulto',precio:160000,checked:false,link:'https://catedralaltapatagonia.com',notas:''}],
    equipo: [
      {id:1,nombre:'Epic Bariloche',descripcion:'Standard diario — esquís + botas + bastones',precio:52000,checked:false,link:'https://www.epicbariloche.com.ar/productos/alquiler-standard-diario1/',notas:''},
      {id:2,nombre:'Nieve Austral',descripcion:'Standard diario',precio:53500,checked:false,link:'https://nieveaustral.com.ar/rental/',notas:''},
      {id:3,nombre:'Travesía Catedral',descripcion:'Standard diario',precio:55000,checked:false,link:'https://travesiacatedral.com.ar/quote',notas:''},
      {id:4,nombre:'Despegar (actividad)',descripcion:'Equipo ski/snowboard',precio:0,checked:false,link:'https://www.despegar.com.ar/actividades/d-PAM_BRC_33750/',notas:'Precio a consultar'},
    ],
    ropa: [
      {id:1,nombre:'Despegar (actividad)',descripcion:'Conjunto completo + casco + antiparras',precio:65000,checked:false,link:'https://www.despegar.com.ar/actividades/d-PAM_BRC_62473/',notas:''},
      {id:2,nombre:'Epic Bariloche',descripcion:'Buzos / ropa nieve hombre',precio:0,checked:false,link:'https://www.epicbariloche.com.ar/invierno/hombre/buzos1/',notas:'A consultar'},
      {id:3,nombre:'Bariloche Travel',descripcion:'Ropa de nieve completa',precio:0,checked:false,link:'https://www.bariloche.travel/producto/alquiler-ropa-de-nieve/',notas:'A consultar'},
      {id:4,nombre:'AlquilerRopaDeSkiAR',descripcion:'Ropa ski',precio:0,checked:false,link:'https://alquilerderopadeski.com.ar/producto/alquiler/',notas:'A consultar'},
    ]
  },
  actividades: [
    {id:1,nombre:'Cerro Catedral (2do día ski)',tipo:'Ski',precio:160000,duracion:'Día completo',fecha:'',fechaFin:'',checked:false,link:'',notas:'Mismo pase que día 1'},
    {id:2,nombre:'Piedras Blancas — trineos / snow tubing',tipo:'Excursión',precio:0,duracion:'Medio día',fecha:'',fechaFin:'',checked:false,link:'http://www.piedrasblancasbariloche.com/actividades.html',notas:''},
    {id:3,nombre:'Cerro Otto (teleférico)',tipo:'Excursión',precio:0,duracion:'Medio día',fecha:'',fechaFin:'',checked:false,link:'https://www.telefericobariloche.com.ar/en',notas:''},
    {id:4,nombre:'Villa Llao Llao + Cerro Campanario',tipo:'Circuito',precio:0,duracion:'Día completo',fecha:'',fechaFin:'',checked:false,link:'https://cerrocampanario.com.ar/',notas:''},
    {id:5,nombre:'Circuito Chico (lunes mañana)',tipo:'Circuito',precio:0,duracion:'Mañana',fecha:'',fechaFin:'',checked:false,link:'',notas:''},
  ],
  traslados: [
    {id:1,nombre:'Aeropuerto BRC → Hospedaje',tipo:'Remis / Transfer',precio:0,checked:false,notas:'A cotizar en llegada'},
    {id:2,nombre:'Hospedaje → Cerro Catedral',tipo:'Bus / Remis',precio:0,checked:false,notas:''},
    {id:3,nombre:'Cerro Catedral → Hospedaje',tipo:'Bus / Remis',precio:0,checked:false,notas:''},
    {id:4,nombre:'Excursión día 3',tipo:'Tour / Auto',precio:0,checked:false,notas:''},
    {id:5,nombre:'Recorrido circuito día 4',tipo:'Tour / Auto',precio:0,checked:false,notas:''},
    {id:6,nombre:'Hospedaje → Aeropuerto BRC',tipo:'Remis / Transfer',precio:0,checked:false,notas:''},
  ]
};

function migrateState(s){
  if(s.vuelos&&s.vuelos.santi!==undefined){
    s={...s,personas:[],vuelos:{}};
  }
  if(!s.personas)s.personas=[];
  if(!s.vuelos||Array.isArray(s.vuelos))s.vuelos={};
  if(!s.tripName)s.tripName='Mi Viaje';
  if(s.tripDate===undefined)s.tripDate='';
  if(s.ski&&!s.ski.dias)s.ski.dias=[];
  if(s.actividades)s.actividades=s.actividades.map(a=>({fecha:'',fechaFin:'',...a}));
  return s;
}

let state;
function loadState(){try{const s=localStorage.getItem('brc2026');if(s)return migrateState(JSON.parse(s));}catch(e){}return JSON.parse(JSON.stringify(DEFAULT));}
let _saveTimer=null;
function saveState(){
  try{localStorage.setItem('brc2026',JSON.stringify(state));}catch(e){}
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>tripDoc.set(state).catch(console.error),600);
}

function getSelected(arr){return arr?arr.find(i=>i.checked)||null:null;}
function nextId(arr){return Math.max(0,...arr.map(i=>i.id))+1;}

let _modalLocked=false;
function openModal(html){$('modal-box').innerHTML=html;$('modal-overlay').style.display='flex';}
function closeModal(){if(_modalLocked)return;$('modal-overlay').style.display='none';}

function renderTitle(){
  const name=state.tripName||'Mi Viaje';
  const date=state.tripDate||'';
  $('app-title').innerHTML=`${name}${date?` <span>${date}</span>`:''} <button class="btn-icon" onclick="editTitle()" style="font-size:14px;vertical-align:middle;opacity:.5"><i class="ti ti-edit"></i></button>`;
  document.title=name+' — Planificador';
}
function editTitle(){
  openModal(`<h3>Editar viaje</h3>
    <div class="form-group"><label>Nombre del viaje</label><input id="ttn" value="${state.tripName||''}"></div>
    <div class="form-group"><label>Fechas</label><input id="ttd" value="${state.tripDate||''}" placeholder="ej: 14–18 agosto"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveTitle()">Guardar</button>
    </div>`);
  setTimeout(()=>$('ttn')&&$('ttn').focus(),50);
}
function saveTitle(){
  state.tripName=$('ttn').value.trim()||'Mi Viaje';
  state.tripDate=$('ttd').value.trim();
  saveState();closeModal();renderTitle();
}
function fmtDate(iso){
  if(!iso)return'';
  const[y,m,d]=iso.split('-').map(Number);
  return new Date(y,m-1,d).toLocaleDateString('es-AR',{weekday:'short',day:'numeric',month:'short'}).replace(/\./g,'');
}

function buildItinerary(){
  const byDate={};
  (state.ski.dias||[]).forEach(d=>{
    if(!d.fecha)return;
    if(!byDate[d.fecha])byDate[d.fecha]=[];
    byDate[d.fecha].push({icon:'ti-mountain',label:'Ski — Cerro Catedral',note:d.notas||''});
  });
  state.actividades.forEach(a=>{
    if(!a.fecha)return;
    if(!byDate[a.fecha])byDate[a.fecha]=[];
    const note=a.fechaFin?`Hasta el ${fmtDate(a.fechaFin)}`:(a.duracion||'');
    byDate[a.fecha].push({icon:'ti-map',label:a.nombre,note,badge:a.tipo});
  });
  const sortedDates=Object.keys(byDate).sort();
  const undatedSki=(state.ski.dias||[]).filter(d=>!d.fecha);
  const undatedAct=state.actividades.filter(a=>!a.fecha);
  return{byDate,sortedDates,undatedSki,undatedAct};
}

function renderSkiDias(){
  const dias=state.ski.dias||[];
  return`<div style="margin-bottom:1.5rem">
    <div class="section-header"><h3>Días de ski</h3><button class="btn-icon" onclick="addSkiDia()" title="Agregar día" style="font-size:18px"><i class="ti ti-plus"></i></button></div>
    ${dias.length===0?'<p style="font-size:12px;color:var(--color-text-tertiary);padding:.5rem 0">Sin días planificados. Agregá uno para que aparezca en el itinerario.</p>':''}
    ${dias.map(d=>`<div class="card"><div class="card-row">
      <i class="ti ti-mountain" style="font-size:18px;color:var(--color-text-secondary);flex-shrink:0;margin-top:2px"></i>
      <div class="card-body">
        <div class="item-name">${d.fecha?fmtDate(d.fecha):'Sin fecha'}</div>
        ${d.notas?`<div class="item-meta"><span style="color:var(--color-text-secondary)">${d.notas}</span></div>`:''}
      </div>
      <div class="card-actions">
        <button class="btn-icon" onclick="editSkiDia(${d.id})"><i class="ti ti-edit"></i></button>
        <button class="btn-icon" onclick="deleteSkiDia(${d.id})"><i class="ti ti-trash"></i></button>
      </div>
    </div></div>`).join('')}
  </div>`;
}
function formSkiDia(d){
  const isEdit=!!d;d=d||{fecha:'',notas:''};
  openModal(`<h3>${isEdit?'Editar día de ski':'Agregar día de ski'}</h3>
    <div class="form-group"><label>Fecha</label><input id="skd" type="date" value="${d.fecha||''}"></div>
    <div class="form-group"><label>Notas</label><input id="skn" value="${d.notas||''}" placeholder="ej: iniciación, pista verde"></div>
    <div class="modal-actions">
      ${isEdit?`<button class="btn-danger" onclick="deleteSkiDia(${d.id});closeModal()">Eliminar</button>`:''}
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveSkiDia(${isEdit?d.id:0})">Guardar</button>
    </div>`);
}
function addSkiDia(){formSkiDia(null);}
function editSkiDia(id){formSkiDia((state.ski.dias||[]).find(d=>d.id===id));}
function saveSkiDia(id){
  if(!state.ski.dias)state.ski.dias=[];
  const n={fecha:$('skd').value,notas:$('skn').value};
  if(id){state.ski.dias=state.ski.dias.map(d=>d.id===id?{...d,...n}:d);}
  else{state.ski.dias.push({...n,id:nextId(state.ski.dias)});}
  saveState();closeModal();renderSki();renderResumen();
}
function deleteSkiDia(id){
  state.ski.dias=(state.ski.dias||[]).filter(d=>d.id!==id);
  saveState();renderSki();renderResumen();
}

function copyTripUrl(){
  navigator.clipboard.writeText(location.href).then(()=>{
    const btn=$('copy-url-btn');
    if(btn){btn.textContent='¡Copiado!';setTimeout(()=>{btn.textContent='Copiar';},2000);}
  });
}

function calcResumen(){
  const n=Math.max(state.personas.length,1);
  const hosp=getSelected(state.hospedaje);
  const hospPP=hosp?Math.round(hosp.precioTotal/n):0;
  const pase=getSelected(state.ski.pase);
  const equipo=getSelected(state.ski.equipo);
  const ropa=getSelected(state.ski.ropa);
  const skiPorDia=(pase?.precio||0)+(equipo?.precio||0)+(ropa?.precio||0);
  const skiDias=(state.ski.dias||[]).length;
  const skiPP=skiPorDia*Math.max(skiDias,1);
  const act=getSelected(state.actividades);
  const personas=state.personas.map(p=>{
    const vuelo=getSelected(state.vuelos[String(p.id)]||[]);
    return{...p,vuelo,total:(vuelo?.precio||0)+hospPP+skiPP};
  });
  return{personas,hosp,hospPP,pase,equipo,ropa,skiPP,skiDias,act,n};
}

function platformBadge(p){
  const m={Airbnb:'badge-blue','Airbnb AR':'badge-blue',Booking:'badge-teal',Hostelworld:'badge-amber'};
  return m[p]||'badge-gray';
}

          <button class="btn-icon" onclick="editPersona(${p.id})" style="font-size:14px;padding:2px"><i class="ti ti-edit"></i></button>

function formPersona(p,firstRun){
  _modalLocked=!!firstRun;
  const isEdit=!!p;
  p=p||{nombre:'',origen:''};
  openModal(`<h3>${firstRun?'Bienvenido — ¿cómo te llamás?':isEdit?'Editar viajero':'Nuevo viajero'}</h3>
    <div class="form-group"><label>Nombre</label><input id="pn" value="${p.nombre}" placeholder="ej: Santi"></div>
    <div class="form-group"><label>Origen / ciudad</label><input id="po" value="${p.origen}" placeholder="ej: Mendoza — MDZ"></div>
    <div class="modal-actions">
      ${isEdit&&!firstRun&&state.personas.length>1?`<button class="btn-danger" onclick="deletePersona(${p.id})">Eliminar</button>`:''}
      ${!firstRun?`<button class="btn-secondary" onclick="closeModal()">Cancelar</button>`:''}
      <button class="btn-primary" onclick="savePersona(${isEdit?p.id:0})">${firstRun?'Empezar':'Guardar'}</button>
    </div>`);
  setTimeout(()=>$('pn')&&$('pn').focus(),50);
}
function editPersona(id){formPersona(state.personas.find(p=>p.id===id),false);}
function savePersona(id){
  const nombre=$('pn').value.trim();
  if(!nombre)return;
  const origen=$('po').value.trim();
  if(id){
    state.personas=state.personas.map(p=>p.id===id?{...p,nombre,origen}:p);
  } else {
    const newId=Math.max(0,...state.personas.map(p=>p.id))+1;
    state.personas.push({id:newId,nombre,origen});
    if(!state.vuelos[String(newId)])state.vuelos[String(newId)]=[];
  }
  _modalLocked=false;
  saveState();closeModal();renderResumen();
}
function deletePersona(id){
  if(state.personas.length<=1)return;
  state.personas=state.personas.filter(p=>p.id!==id);
  delete state.vuelos[String(id)];
  saveState();closeModal();renderResumen();
}

function renderResumen(){

      <i class="ti ${e.icon}" style="font-size:13px;color:var(--color-text-secondary)"></i>

    </div>`).join('')}

  const itUndated=(it.undatedSki.length>0||it.undatedAct.length>0)?`<div style="margin-top:.5rem;padding:.75rem 1rem;border:.5px dashed var(--color-border-tertiary);border-radius:var(--border-radius-md)">

    ${it.undatedSki.map(()=>`<div style="display:flex;align-items:center;gap:6px;padding:3px 0"><i class="ti ti-mountain" style="font-size:13px;color:var(--color-text-secondary)"></i><span style="font-size:13px;color:var(--color-text-secondary)">Ski — sin fecha</span></div>`).join('')}
    ${it.undatedAct.map(a=>`<div style="display:flex;align-items:center;gap:6px;padding:3px 0"><i class="ti ti-map" style="font-size:13px;color:var(--color-text-secondary)"></i><span style="font-size:13px;color:var(--color-text-secondary)">${a.nombre}${a.tipo?' · '+a.tipo:''}</span></div>`).join('')}
  </div>`:'';
  const itEmpty=it.sortedDates.length===0&&it.undatedSki.length===0&&it.undatedAct.length===0?`<p style="font-size:12px;color:var(--color-text-tertiary)">Agregá fechas a actividades y días de ski para ver el itinerario.</p>`:'';
  $('panel-resumen').innerHTML=`
<h2>Resumen del viaje</h2>
<div style="display:flex;align-items:center;gap:8px;padding:.625rem .875rem;background:var(--color-background-secondary);border-radius:var(--border-radius-md);margin-bottom:1.25rem;border:.5px solid var(--color-border-tertiary)">
  <i class="ti ti-link" style="font-size:14px;color:var(--color-text-secondary);flex-shrink:0"></i>
  <span style="font-size:11px;color:var(--color-text-secondary);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${location.href}</span>
  <button id="copy-url-btn" onclick="copyTripUrl()" class="btn-secondary" style="font-size:11px;padding:4px 10px;white-space:nowrap;flex-shrink:0">Copiar</button>
</div>
${renderPersonas()}
<div style="margin-bottom:1.25rem">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
    <span style="font-size:12px;color:var(--color-text-secondary)">Opciones confirmadas: ${confirmed}/${total}</span>
    <span style="font-size:12px;font-weight:500">${pct}%</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
</div>
<div class="summary-grid">
  ${r.personas.map(p=>`<div class="metric-card">
    <div class="metric-label">Total ${p.nombre}</div>
    <div class="metric-value">$${fmt(p.total)}</div>
    <div class="metric-sub">${p.vuelo?'Vuelo: $'+fmt(p.vuelo.precio):'Vuelo sin confirmar'}${p.origen?' · '+p.origen:''}</div>
  </div>`).join('')}
  <div class="metric-card">
    <div class="metric-label">Hospedaje por persona</div>
    <div class="metric-value">${r.hosp?'$'+fmt(r.hospPP):'—'}</div>
    <div class="metric-sub">${r.hosp?r.hosp.nombre+(r.n>1?' · entre '+r.n:''):'Sin seleccionar'}</div>
  </div>
  <div class="metric-card">
    <div class="metric-label">Ski${r.skiDias>1?' ('+r.skiDias+' días)':''} por persona</div>
    <div class="metric-value">$${fmt(r.skiPP)}</div>
    <div class="metric-sub">Pase + equipo + ropa</div>
  </div>
</div>
<div class="divider"></div>
<h3>Opciones seleccionadas</h3>
<div style="display:flex;flex-direction:column;gap:.5rem;margin-bottom:1.25rem">
${r.personas.map(p=>lineItem('Vuelo '+p.nombre,p.vuelo?p.vuelo.nombre:'Sin seleccionar',p.vuelo?p.vuelo.precio:null,'vuelos')).join('')}
${lineItem('Hospedaje (p/p)',r.hosp?r.hosp.nombre:'Sin seleccionar',r.hosp?r.hospPP:null,'hospedaje')}
${lineItem('Pase ski',r.pase?r.pase.nombre:'Sin seleccionar',r.pase?r.pase.precio:null,'ski')}

<div class="divider"></div>

  const isSet=price!==null;
  return`<div style="display:flex;align-items:center;justify-content:space-between;padding:.5rem .75rem;border-radius:var(--border-radius-md);background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary)">

function switchTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===id));

}

function renderPanel(id){
  if(id==='resumen')renderResumen();
  else if(id==='vuelos')renderVuelos();
  else if(id==='hospedaje')renderHospedaje();
  else if(id==='ski')renderSki();
  else if(id==='actividades')renderActividades();
  else if(id==='traslados')renderTraslados();
}

document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>switchTab(t.dataset.tab)));

function toggleVuelo(personaId,id){
  const k=String(personaId);
  state.vuelos[k]=(state.vuelos[k]||[]).map(v=>({...v,checked:v.id===id?!v.checked:false}));
  saveState();renderVuelos();renderResumen();

function getTripId(){
  const hash=location.hash.slice(1);
  if(hash)return hash;
  const id=(typeof crypto!=='undefined'&&crypto.randomUUID)?crypto.randomUUID():
    'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16);});
  history.replaceState(null,'',location.pathname+location.search+'#'+id);
  return id;
}
const TRIP_ID=getTripId();
const tripDoc=db.collection('trips').doc(TRIP_ID);

renderResumen();

tripDoc.onSnapshot(snap=>{
  if(snap.exists){
    state=migrateState(snap.data());
    try{localStorage.setItem('brc2026',JSON.stringify(state));}catch(e){}
    if(_modalLocked&&state.personas.length>0){_modalLocked=false;$('modal-overlay').style.display='none';}
    renderTitle();
    renderPanel(document.querySelector('.tab.active')?.dataset.tab||'resumen');
  } else {
    tripDoc.set(state);
  }
},err=>console.error('Firestore:',err));
