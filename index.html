<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bariloche 2026 — Planificador</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.4.0/dist/tabler-icons.min.css">
<style>
:root {
  --color-background-primary: #ffffff;
  --color-background-secondary: #f5f5f4;
  --color-background-tertiary: #eeede9;
  --color-text-primary: #1a1a18;
  --color-text-secondary: #6b6b68;
  --color-text-tertiary: #9b9b98;
  --color-border-tertiary: rgba(0,0,0,0.12);
  --color-border-secondary: rgba(0,0,0,0.22);
  --color-border-primary: rgba(0,0,0,0.35);
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-serif: Georgia, serif;
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
  --border-radius-xl: 16px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --color-background-primary: #1c1c1a;
    --color-background-secondary: #252523;
    --color-background-tertiary: #2e2e2b;
    --color-text-primary: #f0ede8;
    --color-text-secondary: #a8a8a4;
    --color-text-tertiary: #6b6b68;
    --color-border-tertiary: rgba(255,255,255,0.10);
    --color-border-secondary: rgba(255,255,255,0.18);
    --color-border-primary: rgba(255,255,255,0.28);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--color-background-tertiary);color:var(--color-text-primary);font-size:14px;min-height:100vh;scrollbar-width:none}
body::-webkit-scrollbar{display:none}
.app-wrapper{max-width:720px;margin:0 auto;padding:1.5rem 1rem}
.app-title{font-size:22px;font-weight:500;margin-bottom:1.5rem}
.app-title span{font-size:14px;color:var(--color-text-secondary);font-weight:400;margin-left:8px}
.tabs{display:flex;gap:4px;border-bottom:.5px solid var(--color-border-tertiary);margin-bottom:1.5rem;overflow-x:auto;padding-bottom:0;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 14px;border:none;background:none;cursor:pointer;font-size:13px;color:var(--color-text-secondary);white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:var(--font-sans)}
.tab.active{color:var(--color-text-primary);border-bottom-color:var(--color-text-primary);font-weight:500}
.tab:hover:not(.active){color:var(--color-text-primary);background:var(--color-background-secondary);border-radius:6px 6px 0 0}
.panel{display:none}.panel.active{display:block}
.card{background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:.75rem}
.card.done{opacity:.6}
.card.done .item-name{text-decoration:line-through;color:var(--color-text-secondary)}
.card-row{display:flex;align-items:flex-start;gap:12px}
.card-body{flex:1;min-width:0}
.item-name{font-weight:500;font-size:14px;margin-bottom:4px;word-break:break-word}
.item-meta{font-size:12px;color:var(--color-text-secondary);display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:400}
.badge-blue{background:#E6F1FB;color:#0C447C}
.badge-green{background:#EAF3DE;color:#27500A}
.badge-amber{background:#FAEEDA;color:#633806}
.badge-gray{background:#F1EFE8;color:#444441}
.badge-teal{background:#E1F5EE;color:#085041}
.price-tag{font-size:13px;font-weight:500;color:var(--color-text-primary);white-space:nowrap}
.card-actions{display:flex;gap:4px;flex-shrink:0;margin-top:2px}
.btn-icon{background:none;border:none;cursor:pointer;padding:4px;border-radius:6px;color:var(--color-text-secondary);line-height:1;font-size:16px}
.btn-icon:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.checkbox{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--color-border-secondary);background:var(--color-background-primary);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all .15s}
.checkbox.checked{background:#1D9E75;border-color:#1D9E75}
.checkbox.checked::after{content:'';display:block;width:5px;height:9px;border:2px solid white;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px)}
.add-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border:.5px dashed var(--color-border-secondary);border-radius:var(--border-radius-md);background:none;cursor:pointer;color:var(--color-text-secondary);font-size:13px;font-family:var(--font-sans);width:100%;justify-content:center;margin-top:.5rem}
.add-btn:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem}
.modal{background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.5rem;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal h3{margin-bottom:1rem;font-size:15px;font-weight:500}
.form-group{margin-bottom:.75rem}
.form-group label{display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:4px;font-weight:500}
.form-group input,.form-group select,.form-group textarea{width:100%;font-family:var(--font-sans);font-size:13px;padding:7px 10px;border:.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);outline:none}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--color-border-primary);box-shadow:0 0 0 2px rgba(0,0,0,.06)}
.form-group textarea{resize:vertical;min-height:60px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:1rem;padding-top:1rem;border-top:.5px solid var(--color-border-tertiary)}
.btn-primary{background:var(--color-text-primary);color:var(--color-background-primary);border:none;padding:8px 16px;border-radius:var(--border-radius-md);cursor:pointer;font-size:13px;font-family:var(--font-sans)}
.btn-primary:hover{opacity:.85}
.btn-secondary{background:none;border:.5px solid var(--color-border-secondary);padding:8px 16px;border-radius:var(--border-radius-md);cursor:pointer;font-size:13px;font-family:var(--font-sans);color:var(--color-text-primary)}
.btn-secondary:hover{background:var(--color-background-secondary)}
.btn-danger{background:none;border:.5px solid #E24B4A;color:#E24B4A;padding:8px 16px;border-radius:var(--border-radius-md);cursor:pointer;font-size:13px;font-family:var(--font-sans)}
.btn-danger:hover{background:#FCEBEB}
h2{font-size:18px;font-weight:500;margin-bottom:1rem}
h3{font-size:15px;font-weight:500;margin-bottom:.75rem}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.5rem}
.metric-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.875rem 1rem}
.metric-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.metric-value{font-size:22px;font-weight:500}
.metric-sub{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.progress-bar{height:4px;background:var(--color-background-secondary);border-radius:2px;margin:.5rem 0;overflow:hidden}
.progress-fill{height:100%;background:#1D9E75;border-radius:2px;transition:width .3s}
.divider{height:.5px;background:var(--color-border-tertiary);margin:1.25rem 0}
.link-text{color:#185FA5;font-size:12px;text-decoration:none;display:inline-flex;align-items:center;gap:3px}
.link-text:hover{text-decoration:underline}
.selected-badge{font-size:10px;padding:2px 7px;border-radius:20px;background:#E1F5EE;color:#085041;border:.5px solid #9FE1CB;font-weight:500;margin-left:6px}
.itinerary-day{border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:.75rem}
.itinerary-day-header{display:flex;align-items:center;gap:10px;margin-bottom:.5rem;flex-wrap:wrap}
.day-label{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;background:var(--color-background-secondary);color:var(--color-text-secondary);white-space:nowrap}
.day-activity{font-size:14px;font-weight:500}
.day-note{font-size:12px;color:var(--color-text-secondary);margin-top:4px}
.traslado-pending{font-size:12px;color:var(--color-text-tertiary);font-style:italic}
@media(max-width:480px){.summary-grid{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}}
.cal-day{cursor:pointer;padding:6px 2px;border-radius:6px;font-size:13px;text-align:center;color:var(--color-text-primary);transition:background .1s}
.cal-day:hover{background:var(--color-background-tertiary)}
.cal-day.sel{background:#1D9E75;color:white;font-weight:600}
.cal-day.sel:hover{background:#18876A}
#admin-overlay{position:fixed;inset:0;background:var(--color-background-tertiary);z-index:3000;overflow-y:auto;display:none}
.admin-wrap{max-width:680px;margin:0 auto;padding:2rem 1rem}
.admin-trip-card{background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:.75rem;display:flex;align-items:flex-start;justify-content:space-between;gap:1rem}
.admin-trip-card .trip-hash{font-size:11px;color:var(--color-text-tertiary);font-family:monospace;margin-top:3px}
#undo-toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1c1c1a;color:#f0ede8;padding:.625rem 1.125rem;border-radius:20px;display:none;align-items:center;gap:.875rem;box-shadow:0 4px 20px rgba(0,0,0,.35);z-index:4000;font-size:13px;white-space:nowrap;animation:toastIn .2s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@media(prefers-color-scheme:dark){#undo-toast{background:#f0ede8;color:#1c1c1a}#undo-btn{color:#1D9E75}}
</style>
</head>
<body>
<div class="app-wrapper">
  <div id="app-title" class="app-title"></div>
  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="resumen"><i class="ti ti-layout-dashboard"></i> Resumen</button>
    <button class="tab" data-tab="vuelos"><i class="ti ti-plane"></i> Vuelos</button>
    <button class="tab" data-tab="hospedaje"><i class="ti ti-home"></i> Hospedaje</button>
    <button class="tab" data-tab="ski"><i class="ti ti-mountain"></i> Ski & Equipo</button>
    <button class="tab" data-tab="actividades"><i class="ti ti-map"></i> Actividades</button>
    <button class="tab" data-tab="traslados"><i class="ti ti-car"></i> Traslados</button>
  </div>
  <div id="panel-resumen" class="panel active"></div>
  <div id="panel-vuelos" class="panel"></div>
  <div id="panel-hospedaje" class="panel"></div>
  <div id="panel-ski" class="panel"></div>
  <div id="panel-actividades" class="panel"></div>
  <div id="panel-traslados" class="panel"></div>
</div>

<div id="admin-overlay">
  <div class="admin-wrap">
    <div id="admin-content"></div>
  </div>
</div>

<div id="undo-toast"><span id="undo-label"></span><button id="undo-btn" style="background:none;border:none;color:#1D9E75;font-family:var(--font-sans);font-size:13px;font-weight:600;cursor:pointer;padding:0">Deshacer</button></div>

<div id="modal-overlay" class="modal-overlay" style="display:none">
  <div class="modal" id="modal-box"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script>
const $ = id => document.getElementById(id);
const fmt = n => n ? Math.round(n).toLocaleString('es-AR') : '—';

const DEFAULT = {
  tripName: 'Mi Viaje',
  tripDate: '',
  personas: [],
  vuelos: {},
  hospedaje: [],
  ski: { dias: [], pase: [], equipo: [], ropa: [] },
  actividades: [],
  traslados: []
};

function migrateState(s){
  if(s.vuelos&&s.vuelos.santi!==undefined){
    s={...s,personas:[],vuelos:{}};
  }
  if(!s.personas)s.personas=[];
  if(!s.vuelos||Array.isArray(s.vuelos))s.vuelos={};
  if(!s.tripName)s.tripName='Mi Viaje';
  if(s.tripDate===undefined)s.tripDate='';
  if(s.ski&&!s.ski.dias)s.ski.dias=[];
  if(s.actividades)s.actividades=s.actividades.map(a=>({fecha:'',fechaFin:'',...a}));
  return s;
}

let state;
function lsKey(){return'trip_'+TRIP_ID;}
function loadState(){try{const s=localStorage.getItem(lsKey());if(s)return migrateState(JSON.parse(s));}catch(e){}return JSON.parse(JSON.stringify(DEFAULT));}
let _saveTimer=null;
function saveState(){
  try{localStorage.setItem(lsKey(),JSON.stringify(state));}catch(e){}
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>tripDoc.set(state).catch(console.error),600);
}

function getSelected(arr){return arr?arr.find(i=>i.checked)||null:null;}
function nextId(arr){return Math.max(0,...arr.map(i=>i.id))+1;}

let _undoTimer=null;
function showUndoToast(label,restoreFn,persistent=false){
  clearTimeout(_undoTimer);
  $('undo-label').textContent=label;
  const t=$('undo-toast');t.style.display='flex';
  t.style.animation='none';void t.offsetWidth;t.style.animation='toastIn .2s ease';
  $('undo-btn').onclick=()=>{clearTimeout(_undoTimer);restoreFn();hideUndoToast();};
  if(!persistent)_undoTimer=setTimeout(hideUndoToast,5000);
}
function hideUndoToast(){$('undo-toast').style.display='none';}

let _modalLocked=false;
function openModal(html){$('modal-box').innerHTML=html;$('modal-overlay').style.display='flex';}
function closeModal(){if(_modalLocked)return;$('modal-overlay').style.display='none';}

function renderTitle(){
  const name=state.tripName||'Mi Viaje';
  const date=state.tripDate||'';
  $('app-title').innerHTML=`<span onclick="onAdminGesture()" style="cursor:default;user-select:none">${name}</span>${date?` <span>${date}</span>`:''} <button class="btn-icon" onclick="editTitle()" style="font-size:14px;vertical-align:middle;opacity:.5"><i class="ti ti-edit"></i></button>`;
  document.title=name+' — Planificador';
}
function editTitle(){
  openModal(`<h3>Editar viaje</h3>
    <div class="form-group"><label>Nombre del viaje</label><input id="ttn" value="${state.tripName||''}"></div>
    <div class="form-group"><label>Fechas</label><input id="ttd" value="${state.tripDate||''}" placeholder="ej: 14–18 agosto"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveTitle()">Guardar</button>
    </div>`);
  setTimeout(()=>$('ttn')&&$('ttn').focus(),50);
}
function saveTitle(){
  state.tripName=$('ttn').value.trim()||'Mi Viaje';
  state.tripDate=$('ttd').value.trim();
  saveState();closeModal();renderTitle();
}
function fmtDate(iso){
  if(!iso)return'';
  const[y,m,d]=iso.split('-').map(Number);
  return new Date(y,m-1,d).toLocaleDateString('es-AR',{weekday:'short',day:'numeric',month:'short'}).replace(/\./g,'');
}

function buildItinerary(){
  const byDate={};
  (state.ski.dias||[]).forEach(d=>{
    if(!d.fecha)return;
    if(!byDate[d.fecha])byDate[d.fecha]=[];
    byDate[d.fecha].push({icon:'ti-mountain',label:'Ski — Cerro Catedral',note:d.notas||''});
  });
  state.actividades.forEach(a=>{
    if(!a.fecha)return;
    if(!byDate[a.fecha])byDate[a.fecha]=[];
    const note=a.fechaFin?`Hasta el ${fmtDate(a.fechaFin)}`:(a.duracion||'');
    byDate[a.fecha].push({icon:'ti-map',label:a.nombre,note,badge:a.tipo});
  });
  const sortedDates=Object.keys(byDate).sort();
  const undatedSki=(state.ski.dias||[]).filter(d=>!d.fecha);
  const undatedAct=state.actividades.filter(a=>!a.fecha);
  return{byDate,sortedDates,undatedSki,undatedAct};
}

let _calSelected=new Set();
let _calNotes={};
let _calStartYear=0,_calStartMonth=0;
const CAL_MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const CAL_DAYS=['Lu','Ma','Mi','Ju','Vi','Sá','Do'];

function renderCalMonth(year,month){
  const firstDow=(new Date(year,month,1).getDay()+6)%7;
  const total=new Date(year,month+1,0).getDate();
  const cells=[];
  for(let i=0;i<firstDow;i++)cells.push(`<div></div>`);
  for(let d=1;d<=total;d++){
    const iso=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cells.push(`<div class="cal-day${_calSelected.has(iso)?' sel':''}" id="cal-${iso}" onclick="toggleCalDay('${iso}')">${d}</div>`);
  }
  return`<div style="flex:1;min-width:190px">
    <div style="text-align:center;font-size:12px;font-weight:500;margin-bottom:.5rem;color:var(--color-text-secondary)">${CAL_MONTHS[month]} ${year}</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">
      ${CAL_DAYS.map(d=>`<div style="font-size:10px;color:var(--color-text-tertiary);text-align:center;padding:3px 0">${d}</div>`).join('')}
      ${cells.join('')}
    </div>
  </div>`;
}

function calSaveNotes(){
  Array.from(_calSelected).forEach(iso=>{const el=document.getElementById('cal-note-'+iso);if(el)_calNotes[iso]=el.value;});
}

function updateCalCount(){
  const el=document.getElementById('cal-count');
  if(el){const n=_calSelected.size;el.textContent=n===0?'Ningún día seleccionado':n===1?'1 día seleccionado':n+' días seleccionados';}
}

function updateCalSelectedList(){
  calSaveNotes();
  const listEl=document.getElementById('cal-selected-list');
  if(!listEl)return;
  const sorted=Array.from(_calSelected).sort();
  if(sorted.length===0){listEl.innerHTML='';return;}
  listEl.innerHTML=`<div class="divider" style="margin:.625rem 0"></div>
    <div style="font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.5rem">Notas por día <span style="font-weight:400;text-transform:none">(opcional)</span></div>`+
    sorted.map(iso=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:.375rem">
      <span style="font-size:12px;font-weight:500;min-width:105px;flex-shrink:0">${fmtDate(iso)}</span>
      <input id="cal-note-${iso}" type="text" value="${(_calNotes[iso]||'').replace(/"/g,'&quot;')}" placeholder="nota opcional..." style="flex:1;font-family:var(--font-sans);font-size:12px;padding:5px 8px;border:.5px solid var(--color-border-secondary);border-radius:6px;background:var(--color-background-primary);color:var(--color-text-primary);outline:none">
    </div>`).join('');
}

function toggleCalDay(iso){
  if(_calSelected.has(iso))_calSelected.delete(iso);
  else _calSelected.add(iso);
  const el=document.getElementById('cal-'+iso);
  if(el)el.classList.toggle('sel',_calSelected.has(iso));
  updateCalCount();
  updateCalSelectedList();
}

function calTitle(){
  const y2=_calStartMonth===11?_calStartYear+1:_calStartYear;
  const m2=_calStartMonth===11?0:_calStartMonth+1;
  return _calStartYear===y2?
    `${CAL_MONTHS[_calStartMonth].slice(0,3)} – ${CAL_MONTHS[m2].slice(0,3)} ${_calStartYear}`:
    `${CAL_MONTHS[_calStartMonth].slice(0,3)} ${_calStartYear} – ${CAL_MONTHS[m2].slice(0,3)} ${y2}`;
}

function rerenderCalGrids(){
  const y2=_calStartMonth===11?_calStartYear+1:_calStartYear;
  const m2=_calStartMonth===11?0:_calStartMonth+1;
  const g=document.getElementById('cal-grids');
  if(g)g.innerHTML=renderCalMonth(_calStartYear,_calStartMonth)+renderCalMonth(y2,m2);
  const t=document.getElementById('cal-title');
  if(t)t.textContent=calTitle();
  const now=new Date();
  const pb=document.getElementById('cal-prev');
  if(pb)pb.disabled=(_calStartYear===now.getFullYear()&&_calStartMonth===now.getMonth());
}

function navCal(delta){
  calSaveNotes();
  _calStartMonth+=delta;
  if(_calStartMonth>11){_calStartMonth=0;_calStartYear++;}
  if(_calStartMonth<0){_calStartMonth=11;_calStartYear--;}
  const now=new Date();
  if(_calStartYear<now.getFullYear()||(_calStartYear===now.getFullYear()&&_calStartMonth<now.getMonth())){
    _calStartMonth-=delta;
    if(_calStartMonth>11){_calStartMonth=0;_calStartYear++;}
    if(_calStartMonth<0){_calStartMonth=11;_calStartYear--;}
    return;
  }
  rerenderCalGrids();
}

function openSkiCalendar(){
  _calSelected=new Set((state.ski.dias||[]).map(d=>d.fecha).filter(Boolean));
  _calNotes={};
  (state.ski.dias||[]).forEach(d=>{if(d.fecha&&d.notas)_calNotes[d.fecha]=d.notas;});
  const now=new Date();
  _calStartYear=now.getFullYear();_calStartMonth=now.getMonth();
  openModal(`<h3>Días de ski</h3>
    <p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:.75rem">Tocá los días para seleccionarlos.</p>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.625rem">

function saveSkiCalendar(){
  calSaveNotes();
  const existingByDate={};
  (state.ski.dias||[]).forEach(d=>{if(d.fecha)existingByDate[d.fecha]=d;});
  let maxId=Math.max(0,...(state.ski.dias||[]).map(d=>d.id));
  state.ski.dias=Array.from(_calSelected).sort().map(fecha=>{
    const notas=_calNotes[fecha]||'';
    return existingByDate[fecha]?{...existingByDate[fecha],notas}:{id:++maxId,fecha,notas};
  });
  saveState();closeModal();renderSki();renderResumen();
}

function copyTripUrl(){
  navigator.clipboard.writeText(location.href).then(()=>{
    const btn=$('copy-url-btn');
    if(btn){btn.textContent='¡Copiado!';setTimeout(()=>{btn.textContent='Copiar';},2000);}
  });
}

function calcResumen(){
  const n=Math.max(state.personas.length,1);
  const hosp=getSelected(state.hospedaje);
  const hospPP=hosp?Math.round(hosp.precioTotal/n):0;
  const pase=getSelected(state.ski.pase);
  const equipo=getSelected(state.ski.equipo);
  const ropa=getSelected(state.ski.ropa);
  const skiPorDia=(pase?.precio||0)+(equipo?.precio||0)+(ropa?.precio||0);
  const skiDias=(state.ski.dias||[]).length;
  const skiPP=skiPorDia*Math.max(skiDias,1);
  const act=getSelected(state.actividades);
  const personas=state.personas.map(p=>{
    const vuelo=getSelected(state.vuelos[String(p.id)]||[]);
    return{...p,vuelo,total:(vuelo?.precio||0)+hospPP+skiPP};
  });
  return{personas,hosp,hospPP,pase,equipo,ropa,skiPP,skiDias,act,n};
}

}

function formPersona(p,firstRun){

  openModal(`<h3>${firstRun?'Bienvenido — ¿cómo te llamás?':isEdit?'Editar viajero':'Nuevo viajero'}</h3>

function editPersona(id){formPersona(state.personas.find(p=>p.id===id),false);}
function savePersona(id){
  const nombre=$('pn').value.trim();
  if(!nombre)return;
  const origen=$('po').value.trim();
  if(id){
    state.personas=state.personas.map(p=>p.id===id?{...p,nombre,origen}:p);
  } else {
    const newId=Math.max(0,...state.personas.map(p=>p.id))+1;
    state.personas.push({id:newId,nombre,origen});
    if(!state.vuelos[String(newId)])state.vuelos[String(newId)]=[];
  }
  _modalLocked=false;
  saveState();closeModal();renderResumen();
}
function deletePersona(id){
  if(state.personas.length<=1)return;
  const persona=state.personas.find(p=>p.id===id);
  const idx=state.personas.findIndex(p=>p.id===id);
  const vuelos=state.vuelos[String(id)]||[];
  state.personas=state.personas.filter(p=>p.id!==id);
  delete state.vuelos[String(id)];
  saveState();closeModal();renderResumen();
  showUndoToast(`"${persona.nombre}" eliminado`,()=>{
    state.personas.splice(Math.min(idx,state.personas.length),0,persona);
    state.vuelos[String(id)]=vuelos;
    saveState();renderResumen();
  });
}

function renderAdminPanel(){
  $('admin-content').innerHTML=`

      <h2 style="font-size:18px;font-weight:500">Viajes guardados</h2>

  _adminTripData={};
  db.collection('trips').get()
    .then(snapshot=>{
      const el=$('admin-trips');if(!el)return;
      const trips=[];
      snapshot.forEach(doc=>trips.push({id:doc.id,data:doc.data()}));
      _adminTripData={};
      trips.forEach(t=>{_adminTripData[t.id]=t.data;});
      trips.sort((a,b)=>(a.data.tripName||'').localeCompare(b.data.tripName||''));

      if(trips.length===0){
        el.innerHTML=`<p style="color:var(--color-text-secondary);font-size:13px">No hay viajes guardados.</p>`;
        return;
      }
      el.innerHTML=`<p style="font-size:12px;color:var(--color-text-tertiary);margin-bottom:1rem">${trips.length} viaje${trips.length!==1?'s':''} encontrado${trips.length!==1?'s':''}</p>`+
        trips.map(t=>{
          const nombre=t.data.tripName||'Sin nombre';
          const fecha=t.data.tripDate?` — ${t.data.tripDate}`:'';
          const personas=(t.data.personas||[]).map(p=>p.nombre).join(', ')||'Sin integrantes';
          return`<div class="admin-trip-card" id="atc-${t.id}">
            <div style="flex:1;min-width:0">
              <div style="font-size:15px;font-weight:500">${nombre}<span style="font-weight:400;color:var(--color-text-secondary)">${fecha}</span></div>
              <div style="font-size:12px;color:var(--color-text-secondary);margin-top:4px"><i class="ti ti-users" style="font-size:11px"></i> ${personas}</div>

              <button class="btn-danger" style="padding:6px 10px" onclick="deleteAdminTrip('${t.id}')"><i class="ti ti-trash"></i></button>
            </div>
          </div>`;
        }).join('');
    })
    .catch(err=>{
      const el=$('admin-trips');
      if(el)el.innerHTML=`<p style="color:#E24B4A;font-size:13px">Error: ${err.message}</p>`;
    });
}

function deleteAdminTrip(tripId){
  const tripData=_adminTripData[tripId];
  if(!tripData)return;
  const nombre=tripData.tripName||'Sin nombre';
  db.collection('trips').doc(tripId).delete()
    .then(()=>{
      const card=$('atc-'+tripId);
      if(card)card.remove();
      delete _adminTripData[tripId];
      const countEl=$('admin-trips')?.querySelector('p');
      if(countEl){const n=Object.keys(_adminTripData).length;countEl.textContent=`${n} viaje${n!==1?'s':''} encontrado${n!==1?'s':''}`;}
      showUndoToast(`"${nombre}" eliminado`,()=>{
        db.collection('trips').doc(tripId).set(tripData)
          .then(()=>renderAdminPanel());
      },true);
    })
    .catch(err=>console.error('Error al borrar:',err));
}

  if(hash)return hash;
  const id=(typeof crypto!=='undefined'&&crypto.randomUUID)?crypto.randomUUID():
    'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16);});
  history.replaceState(null,'',location.pathname+location.search+'#'+id);
  return id;
}
const TRIP_ID=getTripId();
const tripDoc=db.collection('trips').doc(TRIP_ID);

state=loadState();
renderTitle();
renderResumen();
if(state.personas.length===0)formPersona(null,true);

tripDoc.onSnapshot(snap=>{
  if(snap.exists){
    state=migrateState(snap.data());
    try{localStorage.setItem(lsKey(),JSON.stringify(state));}catch(e){}
    if(_modalLocked&&state.personas.length>0){_modalLocked=false;$('modal-overlay').style.display='none';}
    renderTitle();
    renderPanel(document.querySelector('.tab.active')?.dataset.tab||'resumen');
  }
  // No crear el documento automáticamente — se crea en el primer saveState()
},err=>console.error('Firestore:',err));
</script>
</body>
</html>
