    <div class="form-group"><label>Nombre</label><input id="stn" value="${state.skiName||'Ski &amp; Equipo'}" placeholder="ej: Ski &amp; Equipo"></div>
    <div class="form-group"><label>Descripción <span style="color:var(--color-text-tertiary)">(opcional)</span></label><input id="std" value="${state.skiDesc||''}" placeholder="ej: Cerro Catedral, agosto"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveSkiTab()">Guardar</button>
    </div>`);
  setTimeout(()=>$('stn')&&$('stn').focus(),50);
}
function saveSkiTab(){
  state.skiName=($('stn').value||'').trim()||'Ski & Equipo';
  state.skiDesc=($('std').value||'').trim();
  saveState();closeModal();renderTabs();renderSki();
}
function deleteSki(){
  const nombre=state.skiName||'Ski & Equipo';
  state.skiVisible=false;
  saveState();renderTabs();switchTab('resumen');
  showUndoToast(`"${nombre}" eliminado`,()=>{
    state.skiVisible=true;saveState();renderTabs();
  },10000);
}
function editSkiSection(key){
  const cur=(state.skiSections||{})[key]||'';
  openModal(`<h3>Editar sub-sección</h3>
    <div class="form-group"><label>Nombre</label><input id="ssk" value="${cur}"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveSkiSection('${key}')">Guardar</button>
    </div>`);
  setTimeout(()=>$('ssk')&&$('ssk').focus(),50);
}
function saveSkiSection(key){
  if(!state.skiSections)state.skiSections={pase:'Pase de ski',equipo:'Alquiler de equipo',ropa:'Alquiler de ropa de nieve'};
  const v=($('ssk').value||'').trim();
  if(v)state.skiSections[key]=v;
  saveState();closeModal();renderSki();
}

function renderCustomTab(tabId){
  const ct=(state.customTabs||[]).find(t=>t.id===tabId);
  const el=$('panel-'+tabId);
  if(!ct||!el)return;
  const total=(ct.secciones||[]).reduce((sum,s)=>sum+(s.items||[]).filter(i=>i.checked).reduce((a,i)=>a+(i.precio||0),0),0);
  el.innerHTML=`
    <div class="section-header">
      <div>
        <h3 style="margin-bottom:${ct.descripcion?'3px':'0'}">${ct.nombre}</h3>
        ${ct.descripcion?`<p style="font-size:12px;color:var(--color-text-secondary)">${ct.descripcion}</p>`:''}
      </div>
      <div style="display:flex;gap:.25rem">
        <button class="btn-icon" onclick="formCustomTab('${tabId}')"><i class="ti ti-edit"></i></button>
        <button class="btn-icon" style="color:#E24B4A" onclick="deleteCustomTab('${tabId}')"><i class="ti ti-trash"></i></button>
      </div>
    </div>
    ${total>0?`<div class="card" style="margin-bottom:1rem">
      <div style="font-size:12px;color:var(--color-text-secondary)">Total seleccionado</div>
      <div style="font-size:20px;font-weight:600;margin-top:2px">$${fmt(total)}</div>
    </div>`:''}
    ${(ct.fechas||[]).length>0?`<div class="card" style="margin-bottom:.75rem">
      <div class="section-header" style="padding-bottom:.625rem;margin-bottom:.625rem;border-bottom:.5px solid var(--color-border-tertiary)">
        <span style="font-size:12px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.04em">Fechas</span>
        <button class="btn-icon" onclick="openCustomTabCalendar('${tabId}')"><i class="ti ti-calendar"></i></button>
      </div>
      ${ct.fechas.map(f=>`<div style="display:flex;align-items:center;gap:8px;padding:.2rem 0">
        <i class="ti ti-calendar-event" style="font-size:13px;color:var(--color-text-tertiary);flex-shrink:0"></i>
        <span style="font-size:13px;font-weight:500">${fmtDate(f.fecha)}</span>
        ${f.nota?`<span style="font-size:12px;color:var(--color-text-secondary)">${f.nota}</span>`:''}
      </div>`).join('')}
    </div>`:''}
    <button class="add-btn" style="margin-bottom:.5rem" onclick="openCustomTabCalendar('${tabId}')"><i class="ti ti-plus"></i> Agregar fecha</button>
    ${(ct.secciones||[]).map(s=>`<div class="card" style="margin-bottom:.75rem">
      <div class="section-header" style="padding-bottom:.75rem;margin-bottom:.75rem;border-bottom:.5px solid var(--color-border-tertiary)">
        <h4 style="font-size:14px;font-weight:500">${s.nombre}</h4>
        <div style="display:flex;gap:.25rem">
          <button class="btn-icon" onclick="formCustomSection('${tabId}','${s.id}')"><i class="ti ti-edit"></i></button>
          <button class="btn-icon" style="color:#E24B4A" onclick="deleteCustomSection('${tabId}','${s.id}')"><i class="ti ti-trash"></i></button>
        </div>
      </div>
      ${(s.items||[]).length===0?'<p style="font-size:12px;color:var(--color-text-tertiary);padding:.25rem 0 .75rem">Sin opciones aún.</p>':''}
      ${(s.items||[]).map(item=>{
        const partic=item.participantes||[];
        const hasSubset=partic.length>0&&partic.length<state.personas.length;
        const expanded=_particExpanded.has('ct-'+tabId+'-'+item.id);
        const partChips=state.personas.map(p=>{
          const sel=!partic.length||partic.includes(p.id);
          return`<button onclick="toggleCustomItemPartic('${tabId}','${s.id}',${item.id},${p.id})" style="padding:3px 10px;border-radius:12px;font-size:12px;cursor:pointer;border:1px solid ${sel?'#1D9E75':'var(--color-border-secondary)'};background:${sel?'#1D9E75':'var(--color-background-primary)'};color:${sel?'white':'var(--color-text-primary)'}">${p.nombre}</button>`;
        }).join('');
        const ctKey='ct-'+tabId+'-'+s.id+'-'+item.id;
        const ctDrop=infoDropHtml(ctKey,[
          {label:'Descripción',value:item.descripcion||''},
          {label:'Precio',value:item.precio>0?'$'+fmt(item.precio):'',color:'#22d685'},
          {label:'Link',html:item.link?`<a href="${item.link}" target="_blank" style="color:#00cce0;text-decoration:none;word-break:break-all">${item.link}</a>`:'',value:item.link?'_':''},
          {label:'Notas',value:item.notas||''},
        ]);
        return`<div class="card${item.checked?' done':''}" draggable="true" data-drag-id="${item.id}" ondragstart="dragStart(event,'ct-${tabId}-${s.id}',${item.id},0)" ondragover="dragOver(event)" ondragenter="dragEnter(event,'ct-${tabId}-${s.id}',${item.id})" ondragleave="dragLeave(event)" ondrop="dragDrop(event,'ct-${tabId}-${s.id}',${item.id},0)" ondragend="dragEnd(event)">
          <div class="card-row" onclick="toggleInfoDrop('${ctKey}','${tabId}')" style="cursor:pointer">
            ${_dh}
            <div class="checkbox${item.checked?' checked':''}" onclick="toggleCustomItem('${tabId}','${s.id}',${item.id});event.stopPropagation()"></div>
            <div class="card-body">
              <div class="item-name">${item.nombre}${item.checked?'<span class="selected-badge">Seleccionado</span>':''}${hasSubset?`<span style="font-size:10px;color:#1D9E75;font-weight:500;margin-left:6px">${partic.length}/${state.personas.length} viajeros</span>`:''}</div>
              <div class="item-meta">
                ${item.descripcion?`<span style="color:var(--color-text-secondary)">${item.descripcion}</span>`:''}
                ${item.notas?`<span style="color:var(--color-text-secondary);font-style:italic">${item.notas}</span>`:''}
              </div>
            </div>
            ${itemPriceBlock(item.precio>0?item.precio:0)}
            <div class="card-actions" onclick="event.stopPropagation()">
              ${item.link?`<button class="btn-icon" onclick="window.open('${item.link}','_blank')" title="Abrir link"><i class="ti ti-external-link"></i></button>`:''}
              ${state.personas.length>1?`<button class="btn-icon${hasSubset?' btn-icon-active':''}" onclick="toggleParticOpen('ct-${tabId}-${item.id}','${tabId}')" title="Participantes" style="${hasSubset?'color:#1D9E75':''}"><i class="ti ti-users"></i></button>`:''}
              <button class="btn-icon" onclick="formCustomItem('${tabId}','${s.id}',${item.id})"><i class="ti ti-edit"></i></button>
              <button class="btn-icon" onclick="deleteCustomItem('${tabId}','${s.id}',${item.id})"><i class="ti ti-trash"></i></button>
            </div>
          </div>
          ${ctDrop}
          ${expanded?`<div style="padding:.5rem .75rem .75rem;border-top:.5px solid var(--color-border-tertiary);margin-top:0">
            <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:6px">¿Quiénes participan?</div>
            <div style="display:flex;flex-wrap:wrap;gap:6px">${partChips}</div>
          </div>`:''}
        </div>`;
      }).join('')}
      <button class="add-btn" onclick="formCustomItem('${tabId}','${s.id}',null)"><i class="ti ti-plus"></i> Agregar opción</button>
    </div>`).join('')}
    <button class="add-btn" onclick="formCustomSection('${tabId}',null)"><i class="ti ti-plus"></i> Agregar sub-sección</button>`;
}

function openCustomTabCalendar(tabId){
  const ct=(state.customTabs||[]).find(t=>t.id===tabId);if(!ct)return;
  if(!ct.fechas)ct.fechas=[];
  _calSelected=new Set(ct.fechas.map(f=>f.fecha).filter(Boolean));
  _calNotes={};
  ct.fechas.forEach(f=>{if(f.fecha&&f.nota)_calNotes[f.fecha]=f.nota;});
  const{year:_cy,month:_cm}=smartCalStart();
  _calStartYear=_cy;_calStartMonth=_cm;
  openModal(`<h3>Fechas — ${ct.nombre}</h3>
    <p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:.75rem">Tocá los días para seleccionarlos.</p>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.625rem">
      <button id="cal-prev" class="btn-icon" onclick="navCal(-1)"><i class="ti ti-chevron-left"></i></button>
      <span id="cal-title" style="font-size:12px;color:var(--color-text-secondary)">${calTitle()}</span>
      <button class="btn-icon" onclick="navCal(1)"><i class="ti ti-chevron-right"></i></button>
    </div>
    <div id="cal-grids" style="display:flex;gap:1.5rem;flex-wrap:wrap">
      ${renderCalMonth(_calStartYear,_calStartMonth)}${(()=>{const y2=_calStartMonth===11?_calStartYear+1:_calStartYear;const m2=_calStartMonth===11?0:_calStartMonth+1;return renderCalMonth(y2,m2);})()}
    </div>
    <div id="cal-count" style="font-size:12px;font-weight:500;color:#1D9E75;margin-top:.75rem">${_calSelected.size===0?'Ningún día seleccionado':_calSelected.size===1?'1 día seleccionado':_calSelected.size+' días seleccionados'}</div>
    <div id="cal-selected-list"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveCustomTabCalendar('${tabId}')">Guardar</button>
    </div>`);
  if(_calSelected.size>0)updateCalSelectedList();
}

function saveCustomTabCalendar(tabId){
  calSaveNotes();
  const ct=(state.customTabs||[]).find(t=>t.id===tabId);if(!ct)return;
  ct.fechas=Array.from(_calSelected).sort().map(fecha=>({fecha,nota:_calNotes[fecha]||''}));
  saveState();closeModal();renderCustomTab(tabId);
}

function formCustomTab(tabId){
  const ct=tabId?(state.customTabs||[]).find(t=>t.id===tabId):null;
  const isEdit=!!ct;
  openModal(`<h3>${isEdit?'Editar':'Nueva'} sección personalizada</h3>
    <div class="form-group"><label>Nombre</label><input id="ctn" value="${ct?ct.nombre:''}" placeholder="ej: Auto &amp; Gastos"></div>
    <div class="form-group"><label>Descripción <span style="color:var(--color-text-tertiary)">(opcional)</span></label><input id="ctd" value="${ct?ct.descripcion||'':''}" placeholder="ej: Alquiler de auto y gastos asociados"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveCustomTab(${isEdit?`'${tabId}'`:'null'})">${isEdit?'Guardar':'Crear'}</button>
    </div>`);
  setTimeout(()=>$('ctn')&&$('ctn').focus(),50);
}

function saveCustomTab(tabId){
  const nombre=($('ctn').value||'').trim();if(!nombre)return;
  const descripcion=($('ctd').value||'').trim();
  if(!state.customTabs)state.customTabs=[];
  if(tabId){
    state.customTabs=state.customTabs.map(t=>t.id===tabId?{...t,nombre,descripcion}:t);
    saveState();closeModal();renderTabs();
    document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tabId));
    renderCustomTab(tabId);
  } else {
    const id='ct-'+newId();
    state.customTabs.push({id,nombre,descripcion,secciones:[]});
    saveState();closeModal();renderTabs();switchTab(id);
  }
}

function deleteCustomTab(tabId){
  const ct=(state.customTabs||[]).find(t=>t.id===tabId);if(!ct)return;
  const idx=state.customTabs.indexOf(ct);
  state.customTabs=state.customTabs.filter(t=>t.id!==tabId);
  saveState();renderTabs();switchTab('resumen');
  showUndoToast(`"${ct.nombre}" eliminado`,()=>{
    state.customTabs.splice(Math.min(idx,state.customTabs.length),0,ct);
    saveState();renderTabs();
  },10000);
}

function formCustomSection(tabId,sectionId){
  const ct=(state.customTabs||[]).find(t=>t.id===tabId);if(!ct)return;
  const isEdit=!!sectionId;
  const s=isEdit?ct.secciones.find(s=>s.id===sectionId):null;
  openModal(`<h3>${isEdit?'Editar':'Nueva'} sub-sección</h3>
    <div class="form-group"><label>Nombre</label><input id="csn" value="${s?s.nombre:''}" placeholder="ej: Alquiler, Combustible..."></div>
    <div class="modal-actions">
      ${isEdit?`<button class="btn-danger" onclick="deleteCustomSection('${tabId}','${sectionId}');closeModal()">Eliminar</button>`:''}
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveCustomSection('${tabId}',${isEdit?`'${sectionId}'`:'null'})">${isEdit?'Guardar':'Crear'}</button>
    </div>`);
  setTimeout(()=>$('csn')&&$('csn').focus(),50);
}

function saveCustomSection(tabId,sectionId){
  const nombre=($('csn').value||'').trim();if(!nombre)return;
  const ct=(state.customTabs||[]).find(t=>t.id===tabId);if(!ct)return;
  if(sectionId){
    ct.secciones=ct.secciones.map(s=>s.id===sectionId?{...s,nombre}:s);
  } else {
    ct.secciones.push({id:'cs-'+newId(),nombre,items:[]});
  }
  saveState();closeModal();renderCustomTab(tabId);
}

function deleteCustomSection(tabId,sectionId){
  const ct=(state.customTabs||[]).find(t=>t.id===tabId);if(!ct)return;
  const s=ct.secciones.find(s=>s.id===sectionId);
  const idx=ct.secciones.indexOf(s);
  ct.secciones=ct.secciones.filter(s=>s.id!==sectionId);
  saveState();renderCustomTab(tabId);
  showUndoToast(`Sub-sección "${s.nombre}" eliminada`,()=>{
    ct.secciones.splice(Math.min(idx,ct.secciones.length),0,s);
    saveState();renderCustomTab(tabId);
  });
}

function formCustomItem(tabId,sectionId,itemId){
  const ct=(state.customTabs||[]).find(t=>t.id===tabId);if(!ct)return;
  const s=ct.secciones.find(s=>s.id===sectionId);if(!s)return;
  const isEdit=!!itemId;
  const item=isEdit?s.items.find(i=>i.id===itemId):null;
  const e=item||{nombre:'',descripcion:'',precio:'',link:'',notas:''};
  openModal(`<h3>${isEdit?'Editar':'Nueva'} opción — ${s.nombre}</h3>
    <div class="form-group"><label>Nombre</label><input id="cin" value="${e.nombre}" placeholder="ej: Hertz compact"></div>
    <div class="form-group"><label>Descripción</label><input id="cid" value="${e.descripcion||''}" placeholder="opcional"></div>
    <div class="form-group"><label>Precio (ARS)</label><input id="cip" type="number" value="${e.precio||''}" placeholder="0"></div>
    <div class="form-group"><label>Link</label><input id="cil" value="${e.link||''}" placeholder="https://..."></div>
    <div class="form-group"><label>Notas</label><input id="cino" value="${e.notas||''}" placeholder="opcional"></div>
    <div class="modal-actions">
      ${isEdit?`<button class="btn-danger" onclick="deleteCustomItem('${tabId}','${sectionId}',${itemId});closeModal()">Eliminar</button>`:''}
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveCustomItem('${tabId}','${sectionId}',${isEdit?itemId:0})">${isEdit?'Guardar':'Agregar'}</button>
    </div>`);
  setTimeout(()=>$('cin')&&$('cin').focus(),50);
}

function saveCustomItem(tabId,sectionId,itemId){
  const nombre=($('cin').value||'').trim();if(!nombre)return;
  const ct=(state.customTabs||[]).find(t=>t.id===tabId);if(!ct)return;
  const s=ct.secciones.find(s=>s.id===sectionId);if(!s)return;
  const data={nombre,descripcion:$('cid').value||'',precio:parseFloat($('cip').value)||0,link:$('cil').value||'',notas:$('cino').value||''};
  if(itemId){
    s.items=s.items.map(i=>i.id===itemId?{...i,...data}:i);
  } else {
    data.id=Math.max(0,...s.items.map(i=>i.id))+1;data.checked=false;s.items.push(data);
  }
  saveState();closeModal();renderCustomTab(tabId);
}

function deleteCustomItem(tabId,sectionId,itemId){
  const ct=(state.customTabs||[]).find(t=>t.id===tabId);if(!ct)return;
  const s=ct.secciones.find(s=>s.id===sectionId);if(!s)return;
  const item=s.items.find(i=>i.id===itemId);const idx=s.items.indexOf(item);
  s.items=s.items.filter(i=>i.id!==itemId);
  saveState();renderCustomTab(tabId);
  showUndoToast(`"${item.nombre}" eliminado`,()=>{
    s.items.splice(Math.min(idx,s.items.length),0,item);saveState();renderCustomTab(tabId);
  });
}

function toggleCustomItem(tabId,sectionId,itemId){
  const ct=(state.customTabs||[]).find(t=>t.id===tabId);if(!ct)return;
  const s=ct.secciones.find(s=>s.id===sectionId);if(!s)return;
  s.items=s.items.map(i=>({...i,checked:i.id===itemId?!i.checked:i.checked}));
  saveState();renderCustomTab(tabId);
}

let _adminClicks=0,_adminCTimer=null;
function onAdminGesture(){
  _adminClicks++;
  clearTimeout(_adminCTimer);
  if(_adminClicks>=10){_adminClicks=0;openAdminGate();}
  else _adminCTimer=setTimeout(()=>{_adminClicks=0;},2000);
}

function openAdminGate(){
  $('admin-overlay').style.display='block';
  if(auth.currentUser)renderAdminPanel();
  else renderAdminLogin();
}

function closeAdmin(){$('admin-overlay').style.display='none';}

function renderAdminLogin(){
  $('admin-content').innerHTML=`
    <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem">
      <button class="btn-icon" onclick="closeAdmin()"><i class="ti ti-arrow-left"></i></button>
      <h2 style="font-size:18px;font-weight:500">Acceso administrador</h2>
    </div>
    <div class="card" style="max-width:400px">
      <div class="form-group"><label>Email</label><input id="adm-email" type="email" autocomplete="email" placeholder="tu@email.com"></div>
      <div class="form-group"><label>Contraseña</label><input id="adm-pwd" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')signInAdmin()"></div>
      <div id="adm-err" style="color:#E24B4A;font-size:13px;min-height:1.2em;margin-bottom:.5rem"></div>
      <div style="display:flex;gap:.5rem;justify-content:flex-end">
        <button class="btn-secondary" onclick="closeAdmin()">Cancelar</button>
        <button class="btn-primary" onclick="signInAdmin()">Entrar</button>
      </div>
    </div>`;
  setTimeout(()=>$('adm-email')&&$('adm-email').focus(),50);
}

function signInAdmin(){
  const email=($('adm-email').value||'').trim();
  const pwd=$('adm-pwd').value||'';
  const errEl=$('adm-err');
  if(errEl)errEl.textContent='';
  auth.signInWithEmailAndPassword(email,pwd)
    .then(()=>renderAdminPanel())
    .catch(err=>{
      if(errEl)errEl.textContent=
        ['auth/wrong-password','auth/user-not-found','auth/invalid-credential','auth/invalid-email']
          .includes(err.code)?'Email o contraseña incorrectos.':'Error: '+err.message;
    });
}

let _adminTripData={};
function renderAdminPanel(){
  $('admin-content').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
      <h2 style="font-size:18px;font-weight:500">Viajes guardados</h2>
      <div style="display:flex;gap:.5rem;align-items:center">
        <button class="btn-icon" onclick="renderAdminPanel()" title="Recargar"><i class="ti ti-refresh"></i></button>
        <button class="btn-secondary" onclick="signOutAdmin()"><i class="ti ti-logout" style="font-size:14px;vertical-align:middle"></i> Cerrar sesión</button>
      </div>
    </div>
    <div id="admin-trips"><div style="color:var(--color-text-secondary);font-size:13px;padding:1rem 0">Cargando...</div></div>`;

  _adminTripData={};
  db.collection('trips').get()
    .then(snapshot=>{
      const el=$('admin-trips');if(!el)return;
      const trips=[];
      snapshot.forEach(doc=>trips.push({id:doc.id,data:doc.data()}));
      _adminTripData={};
      trips.forEach(t=>{_adminTripData[t.id]=t.data;});
      trips.sort((a,b)=>(a.data.tripName||'').localeCompare(b.data.tripName||''));

      if(trips.length===0){
        el.innerHTML=`<p style="color:var(--color-text-secondary);font-size:13px">No hay viajes guardados.</p>`;
        return;
      }
      el.innerHTML=`<p style="font-size:12px;color:var(--color-text-tertiary);margin-bottom:1rem">${trips.length} viaje${trips.length!==1?'s':''} encontrado${trips.length!==1?'s':''}</p>`+
        trips.map(t=>{
          const nombre=t.data.tripName||'Sin nombre';
          const fecha=t.data.tripDate?` — ${t.data.tripDate}`:'';
          const personas=(t.data.personas||[]).map(p=>p.nombre).join(', ')||'Sin integrantes';
          return`<div class="admin-trip-card" id="atc-${t.id}">
            <div style="flex:1;min-width:0">
              <div style="font-size:15px;font-weight:500">${nombre}<span style="font-weight:400;color:var(--color-text-secondary)">${fecha}</span></div>
              <div style="font-size:12px;color:var(--color-text-secondary);margin-top:4px"><i class="ti ti-users" style="font-size:11px"></i> ${personas}</div>
              <div class="trip-hash">#${t.id}</div>
            </div>
            <div style="display:flex;gap:.375rem;flex-shrink:0;align-items:center">
              <button class="btn-icon" title="Abrir viaje" onclick="window.open('${location.origin+location.pathname}#${t.id}','_blank')"><i class="ti ti-external-link"></i></button>
              <button class="btn-danger" style="padding:6px 10px" onclick="deleteAdminTrip('${t.id}')"><i class="ti ti-trash"></i></button>
            </div>
          </div>`;
        }).join('');
    })
    .catch(err=>{
      const el=$('admin-trips');
      if(el)el.innerHTML=`<p style="color:#E24B4A;font-size:13px">Error: ${err.message}</p>`;
    });
}

function deleteAdminTrip(tripId){
  const tripData=_adminTripData[tripId];
  if(!tripData)return;
  const nombre=tripData.tripName||'Sin nombre';
  db.collection('trips').doc(tripId).delete()
    .then(()=>{
      const card=$('atc-'+tripId);
      if(card)card.remove();
      delete _adminTripData[tripId];
      const countEl=$('admin-trips')?.querySelector('p');
      if(countEl){const n=Object.keys(_adminTripData).length;countEl.textContent=`${n} viaje${n!==1?'s':''} encontrado${n!==1?'s':''}`;}
      showUndoToast(`"${nombre}" eliminado`,()=>{
        db.collection('trips').doc(tripId).set(tripData)
          .then(()=>renderAdminPanel());
      },0);
    })
    .catch(err=>console.error('Error al borrar:',err));
}

function getTripId(){
  const hash=location.hash.slice(1);
  if(hash)return hash;
  const id=(typeof crypto!=='undefined'&&crypto.randomUUID)?crypto.randomUUID():
    'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16);});
  history.replaceState(null,'',location.pathname+location.search+'#'+id);
  return id;
}

(function(){
  const cv=document.createElement('canvas');
  cv.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0';
  document.body.insertBefore(cv,document.body.firstChild);
  function r(n,s){const x=Math.sin(s+n)*10000;return x-Math.floor(x);}
  function draw(){
    cv.width=window.innerWidth;cv.height=window.innerHeight;
    const ctx=cv.getContext('2d');
    const W=cv.width,H=cv.height;
    const stars=Array.from({length:100},(_,i)=>({x:r(i*3,7)*W,y:r(i*3+1,7)*H,rad:r(i*3+2,7)*0.85+0.25,o:r(i*5,13)*0.55+0.2}));
    stars.forEach(s=>{
      ctx.beginPath();ctx.arc(s.x,s.y,s.rad,0,Math.PI*2);
      ctx.fillStyle=`rgba(195,215,255,${s.o})`;ctx.fill();
    });
    ctx.strokeStyle='rgba(90,140,210,0.09)';ctx.lineWidth=0.6;
    for(let i=0;i<stars.length;i++)for(let j=i+1;j<stars.length;j++){
      const dx=stars[i].x-stars[j].x,dy=stars[i].y-stars[j].y;
      if(dx*dx+dy*dy<(W*0.14)*(W*0.14)&&r(i*17+j,31)>0.76){
        ctx.beginPath();ctx.moveTo(stars[i].x,stars[i].y);ctx.lineTo(stars[j].x,stars[j].y);ctx.stroke();
      }
    }
  }
  draw();window.addEventListener('resize',draw);
})();
</script>
